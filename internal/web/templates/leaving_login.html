{{define "content"}}
<div class="flex flex-col items-center justify-center min-h-[60vh]">
    <div class="flex items-center gap-2.5 mb-2">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" class="w-8 h-8 text-indigo-500 shrink-0" fill="none" stroke="currentColor" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"><path d="M105 60a45 45 0 1 1-45-45c12.6 0 24.65 5 33.7 13.7L105 40"/><path d="M105 15v25h-25"/></svg>
        <h1 class="text-2xl font-bold tracking-wide bg-gradient-to-br from-indigo-500 to-violet-400 bg-clip-text text-transparent">Reclaimer</h1>
    </div>
    <p class="text-zinc-400 text-sm mb-8">Sign in to continue.</p>

    <div id="auth-providers" class="w-full max-w-sm space-y-3">
        <div class="text-center text-zinc-500 text-sm">Loading...</div>
    </div>

    <div id="login-error" class="hidden mt-4 px-4 py-2 rounded bg-red-500/10 border border-red-500/30 text-red-400 text-sm max-w-sm w-full text-center"></div>
</div>

<script>
(function() {
    const providers = document.getElementById('auth-providers');
    const errorEl = document.getElementById('login-error');

    function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.remove('hidden');
    }

    fetch('/auth/status')
        .then(r => r.json())
        .then(data => {
            providers.innerHTML = '';
            let any = false;

            if (data.bootstrap) {
                document.querySelector('p.text-zinc-400').textContent = 'No admin account exists. Sign in or register to become admin.';
            }

            {
                if ((data.bootstrap || data.plex?.enabled) && data.plex?.configured) {
                    any = true;
                    providers.insertAdjacentHTML('beforeend', `
                        <button id="btn-plex" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-[#e5a00d] hover:bg-[#c98d0b] text-black font-medium transition-colors">
                            Sign in with Plex
                        </button>
                    `);
                    document.getElementById('btn-plex').addEventListener('click', () => {
                        window.location.href = '/auth/plex/redirect';
                    });
                }

                if ((data.bootstrap || data.jellyfin?.enabled) && data.jellyfin?.configured) {
                    any = true;
                    providers.insertAdjacentHTML('beforeend', `
                        <div id="jf-form" class="space-y-2">
                            <div class="text-center text-xs text-zinc-500 uppercase tracking-wide">Jellyfin</div>
                            <input id="jf-user" type="text" placeholder="Username" autocomplete="username"
                                   class="w-full px-3 py-2 rounded-lg bg-zinc-800 border border-zinc-700 text-zinc-100 text-sm placeholder-zinc-500 focus:outline-none focus:border-zinc-500">
                            <input id="jf-pass" type="password" placeholder="Password" autocomplete="current-password"
                                   class="w-full px-3 py-2 rounded-lg bg-zinc-800 border border-zinc-700 text-zinc-100 text-sm placeholder-zinc-500 focus:outline-none focus:border-zinc-500">
                            <button id="btn-jf" class="w-full px-4 py-2.5 rounded-lg bg-[#00a4dc] hover:bg-[#0090c4] text-white font-medium transition-colors">
                                Sign in with Jellyfin
                            </button>
                        </div>
                    `);
                    document.getElementById('btn-jf').addEventListener('click', jellyfinAuth);
                }

                if ((data.bootstrap || data.oidc?.enabled) && data.oidc?.configured) {
                    any = true;
                    const name = data.oidc.display_name || 'SSO';
                    providers.insertAdjacentHTML('beforeend', `
                        <button id="btn-oidc" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-zinc-700 hover:bg-zinc-600 text-zinc-100 font-medium transition-colors">
                            Sign in with ${name}
                        </button>
                    `);
                    document.getElementById('btn-oidc').addEventListener('click', () => {
                        window.location.href = '/auth/oidc/authorize';
                    });
                }

                if (data.bootstrap || data.local?.enabled || data.local?.has_users) {
                    any = true;
                    providers.insertAdjacentHTML('beforeend', `
                        <div id="local-form" class="space-y-2">
                            <div class="text-center text-xs text-zinc-500 uppercase tracking-wide">Local Account</div>
                            <input id="local-user" type="text" placeholder="Username" autocomplete="username"
                                   class="w-full px-3 py-2 rounded-lg bg-zinc-800 border border-zinc-700 text-zinc-100 text-sm placeholder-zinc-500 focus:outline-none focus:border-zinc-500">
                            <input id="local-pass" type="password" placeholder="Password" autocomplete="current-password"
                                   class="w-full px-3 py-2 rounded-lg bg-zinc-800 border border-zinc-700 text-zinc-100 text-sm placeholder-zinc-500 focus:outline-none focus:border-zinc-500">
                            <button id="btn-local" class="w-full px-4 py-2.5 rounded-lg bg-zinc-700 hover:bg-zinc-600 text-zinc-100 font-medium transition-colors">
                                Sign in
                            </button>
                        </div>
                    `);
                    document.getElementById('btn-local').addEventListener('click', localAuth);
                }

                if (data.bootstrap) {
                    any = true;
                    providers.insertAdjacentHTML('beforeend', `
                        <div class="space-y-2 pt-2 border-t border-zinc-800">
                            <div class="text-center text-xs text-zinc-500 uppercase tracking-wide">Create Admin Account</div>
                            <input id="boot-user" type="text" placeholder="Username" autocomplete="username"
                                   class="w-full px-3 py-2 rounded-lg bg-zinc-800 border border-zinc-700 text-zinc-100 text-sm placeholder-zinc-500 focus:outline-none focus:border-zinc-500">
                            <input id="boot-pass" type="password" placeholder="Password (min 8 characters)" autocomplete="new-password"
                                   class="w-full px-3 py-2 rounded-lg bg-zinc-800 border border-zinc-700 text-zinc-100 text-sm placeholder-zinc-500 focus:outline-none focus:border-zinc-500">
                            <button id="btn-boot" class="w-full px-4 py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-medium transition-colors">
                                Create admin account
                            </button>
                        </div>
                    `);
                    document.getElementById('btn-boot').addEventListener('click', bootstrapRegister);
                }

                if (!any) {
                    providers.innerHTML = '<div class="text-center text-zinc-500 text-sm">No authentication providers are configured.</div>';
                }
            }
        });

    function bootstrapRegister() {
        const user = document.getElementById('boot-user').value.trim();
        const pass = document.getElementById('boot-pass').value;
        if (!user || !pass) { showError('Username and password are required'); return; }
        if (pass.length < 8) { showError('Password must be at least 8 characters'); return; }

        fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) showError(data.error);
            else window.location.href = '/';
        })
        .catch(() => showError('Failed to create account'));
    }

    function jellyfinAuth() {
        const user = document.getElementById('jf-user').value.trim();
        const pass = document.getElementById('jf-pass').value;
        if (!user) { showError('Username is required'); return; }

        fetch('/auth/jellyfin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) showError(data.error);
            else window.location.href = '/';
        })
        .catch(() => showError('Failed to authenticate'));
    }

    function localAuth() {
        const user = document.getElementById('local-user').value.trim();
        const pass = document.getElementById('local-pass').value;
        if (!user || !pass) { showError('Username and password are required'); return; }

        fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) showError(data.error);
            else window.location.href = '/';
        })
        .catch(() => showError('Failed to authenticate'));
    }
})();
</script>
{{end}}
