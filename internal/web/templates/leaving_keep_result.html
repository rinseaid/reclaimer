{{define "content"}}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center">
    {{if .Success}}
    <div class="w-16 h-16 rounded-full bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
    </div>
    <h1 class="text-xl font-bold text-zinc-100 mb-2">Kept!</h1>
    <p class="text-zinc-400"><strong class="text-zinc-200">{{.Title}}</strong> has been marked to keep.</p>
    {{else}}
    <div class="w-16 h-16 rounded-full bg-red-500/10 border border-red-500/30 flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </div>
    <h1 class="text-xl font-bold text-zinc-100 mb-2">Couldn't Keep</h1>
    <p class="text-zinc-400">{{.Error}}</p>
    {{end}}
    <a href="/leaving" class="mt-6 text-sm text-zinc-500 hover:text-zinc-300 transition-colors">View all items &rarr;</a>
</div>
{{end}}
