{{define "content"}}

<div class="mb-6">
    <input type="search" id="item-search" placeholder="Search for any movie or TV show..."
           autocomplete="off"
           class="w-full max-w-md bg-zinc-900 border border-zinc-700 rounded-md px-3 py-2 text-zinc-100 placeholder-zinc-500 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none">
    <div id="search-results" class="hidden relative">
        <div id="search-results-list" class="absolute top-0 left-0 right-0 max-h-72 overflow-y-auto bg-zinc-900 border border-zinc-700 rounded-md z-50"></div>
    </div>
</div>

<div id="item-data"><p class="text-zinc-400 animate-pulse">Loading item...</p></div>

<!-- Toast container -->
<div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

<!-- Delete confirmation dialog -->
<dialog id="delete-dialog" class="bg-zinc-900 border border-zinc-700 rounded-lg p-0 backdrop:bg-black/60 max-w-sm w-full">
    <div class="p-6">
        <h3 class="text-lg font-semibold text-zinc-100 mb-3">Confirm Delete</h3>
        <p class="text-zinc-300 mb-6">Delete this item? This cannot be undone.</p>
        <div class="flex gap-3">
            <button class="flex-1 px-4 py-2 rounded-md border border-zinc-700 text-zinc-300 hover:bg-zinc-800 transition-colors"
                    onclick="document.getElementById('delete-dialog').close()">Cancel</button>
            <button id="confirm-delete-btn"
                    class="flex-1 px-4 py-2 rounded-md bg-rose-600 text-white font-medium hover:bg-rose-500 transition-colors">Delete</button>
        </div>
    </div>
</dialog>

<script>
window.showToast = function(message, kind) {
    kind = kind || 'success';
    const palette = {
        success: 'bg-emerald-500/15 border-emerald-500/40 text-emerald-300',
        error:   'bg-rose-500/15 border-rose-500/40 text-rose-300',
        info:    'bg-sky-500/15 border-sky-500/40 text-sky-300',
    };
    const cls = palette[kind] || palette.success;
    const container = document.getElementById('toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = `pointer-events-auto px-4 py-2.5 rounded-md border text-sm font-medium shadow-lg transition-all duration-200 opacity-0 translate-y-[-6px] ${cls}`;
    toast.textContent = message;
    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.remove('opacity-0', 'translate-y-[-6px]'));
    setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-[-6px]'); setTimeout(() => toast.remove(), 250); }, 3000);
};

const ratingKey = "{{.Name}}";

if (!ratingKey) {
    document.getElementById('item-data').innerHTML = '<p class="text-zinc-500">Search for a movie or TV show above to see its details.</p>';
}

function formatBytes(bytes) {
    if (!bytes) return '-';
    if (bytes >= 1099511627776) return (bytes / 1099511627776).toFixed(1) + ' TB';
    return (bytes / 1073741824).toFixed(1) + ' GB';
}
const fmtDate = (d) => d ? new Date(d).toLocaleDateString(undefined, {year:'numeric',month:'short',day:'numeric'}) : '-';
function formatDuration(seconds) {
    if (!seconds || seconds <= 0) return '--';
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
}
const fmtDateTime = (d) => d ? new Date(d).toLocaleString('en-AU', {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '-';
function fmtDateTimeUTC(d) {
    if (!d) return '-';
    const s = (d.includes('T') ? d : d.replace(' ', 'T')) + (d.includes('Z') || d.includes('+') ? '' : 'Z');
    return new Date(s).toLocaleString('en-AU', {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

if (ratingKey) {
Promise.all([
    fetch(`/api/items/${ratingKey}`).then(r => r.json()),
    fetch('/api/settings').then(r => r.json()).catch(() => ({})),
    fetch('/api/settings/plex-libraries').then(r => r.json()).catch(() => ({})),
    fetch('/api/instances').then(r => r.json()).catch(() => ({instances: []})),
])
.then(async ([data, settings, plexInfo, instancesData]) => {
    const _instances = (instancesData && instancesData.instances) || [];
    const _defaultOf = (kind) => _instances.find(i => i.kind === kind && i.is_default) || _instances.find(i => i.kind === kind);
    const _radarrInst = _defaultOf('radarr');
    const _sonarrInst = _defaultOf('sonarr');
    settings.radarr_url = _radarrInst ? _radarrInst.url : '';
    settings.radarr_public_url = _radarrInst ? (_radarrInst.public_url || '') : '';
    settings.sonarr_url = _sonarrInst ? _sonarrInst.url : '';
    settings.sonarr_public_url = _sonarrInst ? (_sonarrInst.public_url || '') : '';

    const target = document.getElementById('item-data');

    if (data.error) {
        target.innerHTML = `
            <div class="text-center py-12 px-4 border-2 border-dashed border-zinc-700 rounded-lg">
                <h3 class="text-xl font-semibold text-zinc-100 mb-2">Item Not Found</h3>
                <p class="text-zinc-400 mb-6">${data.error}</p>
                <p class="text-zinc-500 text-sm">This item may have been removed from Plex, or the rating key may be invalid.</p>
            </div>`;
        return;
    }

    const item = data.item;
    const entry = data.tracked ? (data.entries[0] || null) : null;
    const tracked = !!data.tracked;
    let html = '';

    // ── Breadcrumb ──
    if (data.breadcrumb && data.breadcrumb.length) {
        html += '<nav class="text-sm mb-4" aria-label="breadcrumb">';
        data.breadcrumb.forEach((c, i) => {
            if (i > 0) html += '<span class="text-zinc-500 mx-1">/</span>';
            const isLast = i === data.breadcrumb.length - 1;
            if (!isLast && c.rating_key) {
                html += `<a href="/items/${c.rating_key}" class="text-sky-500 hover:text-sky-400">${c.title}</a>`;
            } else {
                html += `<span class="${isLast ? 'text-zinc-300' : 'text-zinc-400'}">${c.title}</span>`;
            }
        });
        html += '</nav>';
    }

    // ── Header ──
    const title = item.title || ratingKey;
    const year = item.year ? ` (${item.year})` : '';
    const summary = item.summary || '';
    const summarySnippet = summary.length > 250 ? summary.slice(0, 250) + '...' : summary;

    html += `<div class="flex items-start gap-5 mb-6">
        <img src="/api/items/${ratingKey}/poster?size=md" loading="lazy" decoding="async" alt=""
             class="shrink-0 rounded-md w-[120px] h-[180px] object-cover bg-zinc-800 border border-zinc-800"
             onerror="this.style.visibility='hidden'">
        <div class="flex-1">
            <h2 class="text-2xl font-bold text-zinc-100 m-0">${title}<span class="text-zinc-500 font-normal text-lg ml-2">${year}</span></h2>`;

    // Tracked badges
    if (entry) {
        const STATUS_LABELS = { staged: 'Pending removal', actioned: 'Removed', migrated: 'Migrated', kept: 'Kept' };
        const statusLabel = STATUS_LABELS[entry.status] || entry.status || 'tracked';
        const statusClasses = {
            kept: 'bg-emerald-500/15 text-emerald-500',
            staged: 'bg-amber-500/15 text-amber-500',
            actioned: 'bg-rose-500/15 text-rose-500',
        };
        const badgeClass = statusClasses[entry.status] || 'bg-zinc-700/40 text-zinc-400';
        html += '<div class="flex items-center gap-2 mt-1.5 flex-wrap">';
        html += `<span class="px-2 py-0.5 rounded-md text-xs font-semibold ${badgeClass}">${statusLabel}</span>`;
        if (entry.collection) {
            const colSlug = entry.collection.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            html += `<a href="/rules/${colSlug}" class="px-2 py-0.5 rounded-md text-xs font-semibold bg-sky-500/15 text-sky-400 no-underline hover:bg-sky-500/25">${entry.collection}</a>`;
        }
        if (entry.override) {
            const oLabel = entry.override === 'keep' ? 'Manually kept' : entry.override === 'delete' ? 'Manually deleted' : entry.override;
            html += `<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-md text-xs font-semibold bg-amber-500/15 text-amber-500">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                ${oLabel}
                <button type="button" id="header-clear-override-btn"
                        class="ml-1 px-1.5 py-0 rounded text-[0.65rem] font-semibold bg-amber-500/20 hover:bg-amber-500/30 text-amber-200 transition-colors"
                        onclick="clearOverrideInline(this)">Clear</button>
            </span>`;
        }
        html += '</div>';
    }

    if (summarySnippet) {
        html += `<p class="text-sm text-zinc-400 mt-2 line-clamp-3">${summarySnippet}</p>`;
    }
    html += '</div></div>';

    // ── Info grid (tracked only) ──
    if (entry) {
        let collectionAction = 'none';
        if (entry.collection) {
            const colSlug = entry.collection.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            try {
                const cfgResp = await fetch(`/api/collections/${encodeURIComponent(colSlug)}/config`);
                if (cfgResp.ok) { collectionAction = (await cfgResp.json()).action || 'none'; }
            } catch(e) {}
        }
        const ACTION_LABELS = { none: 'No action', delete: 'Delete', unmonitor: 'Unmonitor' };
        const now = new Date();
        const graceDate = entry.grace_expires ? new Date(entry.grace_expires) : null;
        const graceExpired = graceDate && graceDate < now;
        let graceText = '-';
        if (graceDate) {
            const ds = fmtDate(entry.grace_expires);
            if (graceExpired) {
                graceText = `${ds} <span class="text-xs text-rose-500">(expired \u2013 action: ${ACTION_LABELS[collectionAction] || collectionAction})</span>`;
            } else {
                const dl = Math.ceil((graceDate - now) / 86400000);
                graceText = `${ds} <span class="text-xs text-zinc-500">(${dl}d left \u2013 then: ${ACTION_LABELS[collectionAction] || collectionAction})</span>`;
            }
        }
        html += `<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <dl><dt class="text-zinc-500 text-xs uppercase tracking-wide mb-0.5">Media Type</dt><dd class="text-zinc-100 font-medium m-0">${entry.media_type || '-'}</dd></dl>
            <dl><dt class="text-zinc-500 text-xs uppercase tracking-wide mb-0.5">Size</dt><dd class="text-zinc-100 font-medium m-0 tabular-nums">${formatBytes(entry.size_bytes)}</dd></dl>
            <dl><dt class="text-zinc-500 text-xs uppercase tracking-wide mb-0.5">First Seen</dt><dd class="text-zinc-100 font-medium m-0">${fmtDate(entry.first_seen)}</dd></dl>
            <dl><dt class="text-zinc-500 text-xs uppercase tracking-wide mb-0.5">Grace Expires</dt><dd class="text-zinc-100 font-medium m-0">${graceText}</dd></dl>
        </div>`;
    }

    // ── Service links ──
    const links = [];
    const radarrUrl = settings.radarr_public_url || settings.radarr_url || '';
    const sonarrUrl = settings.sonarr_public_url || settings.sonarr_url || '';
    const overseerrUrl = settings.overseerr_public_url || settings.overseerr_url || '';
    const jellyfinUrl = settings.jellyfin_public_url || settings.jellyfin_url || '';
    const plexMachineId = plexInfo.machine_id || '';
    const linkCls = 'bg-zinc-800 hover:bg-zinc-700 rounded-md px-3 py-1 text-sm text-zinc-300 no-underline transition-colors';

    if (ratingKey) links.push(`<a href="https://app.plex.tv/desktop/#!/server/${plexMachineId}/details?key=%2Flibrary%2Fmetadata%2F${ratingKey}" target="_blank" class="${linkCls}">Plex</a>`);
    if (jellyfinUrl) links.push(`<a href="${jellyfinUrl}/web/index.html#!/details?id=${ratingKey}" target="_blank" class="${linkCls}">Jellyfin</a>`);
    const entryOrItem = entry || item;
    if (radarrUrl && (entryOrItem.media_type === 'movie') && entry && entry.arr_id) links.push(`<a href="${radarrUrl}/movie/${entry.arr_id}" target="_blank" class="${linkCls}">Radarr</a>`);
    if (sonarrUrl && (entryOrItem.media_type === 'show') && entry && entry.arr_id) links.push(`<a href="${sonarrUrl}/series/${entry.arr_id}" target="_blank" class="${linkCls}">Sonarr</a>`);
    const tmdbId = (entry && entry.tmdb_id) || item.tmdb_id;
    const imdbId = (entry && entry.imdb_id) || item.imdb_id;
    const tvdbId = (entry && entry.tvdb_id) || item.tvdb_id;
    const mediaType = entryOrItem.media_type || '';
    if (overseerrUrl && tmdbId) { const st = mediaType === 'show' ? 'tv' : 'movie'; links.push(`<a href="${overseerrUrl}/${st}/${tmdbId}" target="_blank" class="${linkCls}">Seerr</a>`); }
    if (tmdbId) { const tt = mediaType === 'show' ? 'tv' : 'movie'; links.push(`<a href="https://www.themoviedb.org/${tt}/${tmdbId}" target="_blank" class="${linkCls}">TMDB</a>`); }
    if (imdbId) links.push(`<a href="https://www.imdb.com/title/${imdbId}" target="_blank" class="${linkCls}">IMDb</a>`);
    if (tvdbId) { const vt = mediaType === 'show' ? 'series' : 'movies'; links.push(`<a href="https://thetvdb.com/${vt}/${tvdbId}" target="_blank" class="${linkCls}">TVDB</a>`); }
    if (links.length) html += `<div class="flex gap-2 flex-wrap mb-6">${links.join('')}</div>`;

    // Ratings placeholder
    html += '<div id="ratings-badges" class="mb-4"></div>';

    // ── Children (seasons / episodes) ──
    if (data.children && data.children.length) {
        const isSeasons = data.children[0].type === 'season';
        html += `<h3 class="text-lg font-semibold text-zinc-100 mt-6 mb-3 pb-2 border-b border-zinc-800">${isSeasons ? 'Seasons' : 'Episodes'}</h3>`;

        if (isSeasons) {
            html += '<div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-3 mb-6">';
            for (const c of data.children) {
                html += `<a href="/items/${c.rating_key}" class="group no-underline">
                    <div class="aspect-[2/3] rounded-md overflow-hidden bg-zinc-800 border border-zinc-800 mb-1">
                        <img src="/api/items/${c.rating_key}/poster?size=sm" loading="lazy" decoding="async" alt=""
                             class="w-full h-full object-cover group-hover:opacity-80 transition-opacity"
                             onerror="if(!this.dataset.fell){this.dataset.fell='1';this.src='/api/items/${ratingKey}/poster?size=sm';}else{this.style.visibility='hidden';}">
                    </div>
                    <p class="text-sm font-medium text-zinc-300 group-hover:text-zinc-100 truncate">${c.title}</p>
                    ${c.leaf_count ? '<p class="text-xs text-zinc-500">' + c.leaf_count + ' episodes</p>' : ''}
                </a>`;
            }
            html += '</div>';
        } else {
            html += '<table class="w-full text-sm mb-6"><thead><tr class="border-b border-zinc-800"><th class="text-left py-2 px-3 text-zinc-400 font-medium w-12">#</th><th class="text-left py-2 px-3 text-zinc-400 font-medium">Title</th></tr></thead><tbody class="divide-y divide-zinc-800">';
            for (const c of data.children) {
                html += `<tr class="hover:bg-zinc-800/50 cursor-pointer" onclick="window.location='/items/${c.rating_key}'">
                    <td class="py-2 px-3 text-zinc-500 tabular-nums">${c.index || ''}</td>
                    <td class="py-2 px-3 text-zinc-100">${c.title}</td>
                </tr>`;
            }
            html += '</tbody></table>';
        }
    }

    // ── Rules section (tracked only) ──
    const storedRules = data.rules || [];
    if (tracked) {
        html += '<h3 class="text-lg font-semibold text-zinc-100 mt-10 mb-3 pb-2 border-b border-zinc-800">Rules Affecting This Item</h3>';
        html += '<div id="rules-section"><p class="text-zinc-400 animate-pulse">Evaluating rules live...</p></div>';
    }

    // ── Seerr Requests (tracked only) ──
    if (tracked) {
        html += '<h3 class="text-lg font-semibold text-zinc-100 mt-10 mb-3 pb-2 border-b border-zinc-800">Seerr Requests</h3>';
        html += '<div id="seerr-request-section"><p class="text-zinc-400 animate-pulse">Loading...</p></div>';
    }

    // ── Watch History ──
    html += '<h3 class="text-lg font-semibold text-zinc-100 mt-10 mb-3 pb-2 border-b border-zinc-800">Watch History</h3>';
    if (data.watchers && data.watchers.length > 0) {
        const allHistory = data.watch_history || [];
        const isShow = allHistory.some(h => h.season_number || h.episode_number);

        function avatarHtml(u) {
            const thumb = u.thumb || u.user_thumb;
            return thumb
                ? `<img src="${thumb}" class="w-5 h-5 rounded-full object-cover align-middle inline-block ring-1 ring-zinc-300 dark:ring-zinc-600" alt="">`
                : `<span class="w-5 h-5 rounded-full bg-zinc-200 dark:bg-zinc-700 inline-flex items-center justify-center text-[0.6rem] align-middle text-zinc-600 dark:text-zinc-300">${(u.username||'?')[0].toUpperCase()}</span>`;
        }
        function epInfo(h) {
            if (!isShow) return '';
            const s = h.season_number != null ? String(h.season_number).padStart(2,'0') : '??';
            const e = h.episode_number != null ? String(h.episode_number).padStart(2,'0') : '??';
            const epTitle = h.title && h.grandparent_title && h.title !== h.grandparent_title
                ? h.title.replace(h.grandparent_title, '').replace(/^\s*[-:]\s*/, '') : (h.title || '');
            return `S${s}E${e}${epTitle ? ' \u2013 ' + epTitle : ''}`;
        }

        html += `<table class="w-full text-sm">
            <thead><tr class="border-b border-zinc-800"><th class="text-left py-2 px-3 text-zinc-400 font-medium">User</th><th class="text-left py-2 px-3 text-zinc-400 font-medium">Plays</th>${isShow ? '<th class="text-left py-2 px-3 text-zinc-400 font-medium">Most Recent</th>' : ''}<th class="text-left py-2 px-3 text-zinc-400 font-medium">Last Watched</th></tr></thead>
            <tbody class="divide-y divide-zinc-800">`;
        for (const w of data.watchers) {
            const userHistory = allHistory.filter(h => h.username === w.username);
            const latest = userHistory[0];
            const hasMore = userHistory.length > 1;
            const rowId = 'wh-' + w.username.replace(/[^a-zA-Z0-9]/g, '_');
            html += `<tr class="${hasMore ? 'cursor-pointer hover:bg-zinc-800/50' : ''}" ${hasMore ? 'onclick="toggleWatchDetail(\'' + rowId + '\')"' : ''}>
                <td class="py-2 px-3 text-zinc-100">${avatarHtml(w)} ${w.username}${hasMore ? ' <span class="text-zinc-600 text-xs">&#9656;</span>' : ''}</td>
                <td class="py-2 px-3 text-zinc-300">${w.plays}</td>
                ${isShow && latest ? '<td class="py-2 px-3 text-zinc-300">' + epInfo(latest) + '</td>' : ''}
                <td class="py-2 px-3 text-zinc-300">${fmtDate(w.last_watched)}</td>
            </tr>`;
            if (hasMore) {
                html += `<tr id="${rowId}" class="hidden"><td colspan="${isShow ? 4 : 3}" class="py-1 px-3 pl-8 pb-3">
                    <table class="w-full text-xs"><thead><tr class="border-b border-zinc-800">${isShow ? '<th class="text-left py-1.5 px-2 text-zinc-500 font-medium">Episode</th>' : ''}<th class="text-left py-1.5 px-2 text-zinc-500 font-medium">Watched</th></tr></thead><tbody class="divide-y divide-zinc-800/50">`;
                for (const h of userHistory) {
                    html += `<tr>${isShow ? '<td class="py-1.5 px-2 text-zinc-300">' + epInfo(h) + '</td>' : ''}<td class="py-1.5 px-2 text-zinc-400">${fmtDateTime(h.watched_at)}</td></tr>`;
                }
                html += '</tbody></table></td></tr>';
            }
        }
        html += '</tbody></table>';
    } else {
        html += '<p class="text-zinc-500">No watch history for this item.</p>';
    }

    // ── Debrid cache ──
    if (data.debrid_cache && data.debrid_cache.length > 0) {
        html += '<h3 class="text-lg font-semibold text-zinc-100 mt-10 mb-3 pb-2 border-b border-zinc-800">Debrid Cache</h3>';
        html += '<table class="w-full text-sm"><thead><tr class="border-b border-zinc-800"><th class="text-left py-2 px-3 text-zinc-400 font-medium">Provider</th><th class="text-left py-2 px-3 text-zinc-400 font-medium">Cached</th><th class="text-left py-2 px-3 text-zinc-400 font-medium">Checked</th></tr></thead><tbody class="divide-y divide-zinc-800">';
        for (const d of data.debrid_cache) {
            const cached = d.is_cached
                ? '<span class="text-emerald-500 font-medium">Yes</span>'
                : '<span class="text-rose-500 font-medium">No</span>';
            html += `<tr><td class="py-2 px-3 text-zinc-100">${d.provider}</td><td class="py-2 px-3">${cached}</td><td class="py-2 px-3 text-zinc-300">${fmtDateTimeUTC(d.checked_at)}</td></tr>`;
        }
        html += '</tbody></table>';
    }

    // ── Activity ──
    const ACT_LABELS = { item_added: 'Added to rule', item_override: 'Override changed', item_deleted: 'Deleted', item_actioned: 'Action taken', run_started: 'Scan started', run_completed: 'Scan completed' };
    if (data.activity && data.activity.length > 0) {
        html += '<h3 class="text-lg font-semibold text-zinc-100 mt-10 mb-3 pb-2 border-b border-zinc-800">Activity</h3>';
        html += '<table class="w-full text-sm"><thead><tr class="border-b border-zinc-800"><th class="text-left py-2 px-3 text-zinc-400 font-medium">Time</th><th class="text-left py-2 px-3 text-zinc-400 font-medium">Event</th><th class="text-left py-2 px-3 text-zinc-400 font-medium">Detail</th></tr></thead><tbody class="divide-y divide-zinc-800">';
        for (const a of data.activity) {
            const evtLabel = ACT_LABELS[a.event_type] || a.event_type;
            let detail = '';
            if (a.detail) {
                try {
                    const d = typeof a.detail === 'string' ? JSON.parse(a.detail) : a.detail;
                    if (typeof d === 'object') { const p = []; if (d.dry_run) p.push('Dry run'); if (d.duration) p.push(Math.round(d.duration) + 's'); detail = p.join(' \u00b7 '); }
                    else detail = String(d);
                } catch(e) { detail = String(a.detail); }
            }
            html += `<tr><td class="py-2 px-3 text-zinc-300">${fmtDateTimeUTC(a.timestamp)}</td><td class="py-2 px-3 text-zinc-100">${evtLabel}</td><td class="py-2 px-3 text-zinc-400">${detail}</td></tr>`;
        }
        html += '</tbody></table>';
    }

    // ── Actions (tracked only) ──
    if (tracked) {
        html += `<h3 class="text-lg font-semibold text-zinc-100 mt-10 mb-3 pb-2 border-b border-zinc-800">Actions</h3>
        <div class="flex gap-3 flex-wrap mb-4">
            <button class="px-4 py-2 rounded-md border border-zinc-600 text-zinc-300 hover:bg-zinc-800 transition-colors text-sm font-medium" onclick="doAction('keep', this)">Keep Forever</button>
            <button class="px-4 py-2 rounded-md border border-rose-600 text-rose-500 hover:bg-rose-600/10 transition-colors text-sm font-medium" onclick="confirmDelete(this)">Delete</button>
            <button class="px-4 py-2 rounded-md bg-zinc-800 text-zinc-400 hover:bg-zinc-700 transition-colors text-sm font-medium" onclick="doAction('clear', this)">Clear Override</button>
        </div>
        <div id="action-result"></div>`;
    }

    target.innerHTML = html;

    // ── Post-render: ratings ──
    function renderRatingsBadges(ratings) {
        const container = document.getElementById('ratings-badges');
        if (!container || !ratings) return;
        const badges = [];
        function rc(val, g, y) {
            if (val >= g) return { bg: 'bg-emerald-500/15', text: 'text-emerald-500', border: 'border-emerald-500/40' };
            if (val >= y) return { bg: 'bg-amber-500/15', text: 'text-amber-500', border: 'border-amber-500/40' };
            return { bg: 'bg-rose-500/15', text: 'text-rose-500', border: 'border-rose-500/40' };
        }
        if (ratings.audience_rating != null) { const c = rc(ratings.audience_rating, 7, 5); badges.push(`<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md text-sm font-medium ${c.bg} ${c.text} border ${c.border}">&#9733; ${ratings.audience_rating.toFixed(1)}/10</span>`); }
        if (ratings.critic_rating != null) { const c = rc(ratings.critic_rating, 70, 50); badges.push(`<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md text-sm font-medium ${c.bg} ${c.text} border ${c.border}">&#127813; ${ratings.critic_rating}%</span>`); }
        if (badges.length) container.innerHTML = '<div class="flex gap-2 flex-wrap">' + badges.join('') + '</div>';
    }
    if (data.ratings) renderRatingsBadges(data.ratings);

    // ── Post-render: live rule evaluation (tracked only) ──
    if (tracked) {
        const RULE_LABELS = {
            never_watched: 'Never watched', not_watched_recently: 'Not watched recently',
            show_ended: 'Show ended / cancelled', old_content: 'Added long ago',
            old_season: 'Older season', watch_ratio_low: 'Left unfinished',
            low_rating: 'Low rating', file_size_min: 'Large file',
            release_year_before: 'Old release year',
            no_keep_tag: 'Protected by tag', no_active_request: 'Unwatched Seerr request',
            no_protected_request: 'Protected user activity', not_in_keep_collection: 'In keep collection',
            highly_rated: 'Highly rated', recently_added: 'Recently added',
            partially_watched: 'Partially watched', on_watchlist: 'On a Seerr watchlist',
            plex_favorited: 'Favorited in Plex', series_protection: 'Parent show protected',
            debrid_cached: 'Debrid cache status', request_fulfilled: 'Request fulfilled',
            available_on_debrid: 'Available on debrid',
        };
        const ACTION_LABELS_R = { none: 'No action', delete: 'Delete', unmonitor: 'Unmonitor' };

        async function renderRules(evaluations, source) {
            const container = document.getElementById('rules-section');
            if (!container) return;
            const ruleConfigs = {};
            await Promise.all(evaluations.map(async ev => {
                const slug = (ev.collection || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                if (!slug) return;
                try {
                    const resp = await fetch(`/api/collections/${slug}/config`);
                    if (resp.ok) {
                        const cfg = await resp.json();
                        let crit = cfg.criteria || {};
                        if (typeof crit === 'string') try { crit = JSON.parse(crit); } catch(_) { crit = {}; }
                        ruleConfigs[ev.collection] = { protected_collections: crit.protected_collections || [], library_source: crit.library_source || 'plex' };
                    }
                } catch(_) {}
            }));

            function checkLabel(ruleName, ev) {
                if (ruleName === 'not_in_keep_collection') {
                    const c = ruleConfigs[ev.collection] || {};
                    const cols = c.protected_collections || [];
                    const srv = c.library_source === 'jellyfin' ? 'Jellyfin' : 'Plex';
                    if (cols.length === 0) return 'In a keep collection';
                    if (cols.length === 1) return `In ${srv} collection "${cols[0]}"`;
                    return `In any ${srv} protected collection (${cols.length})`;
                }
                return RULE_LABELS[ruleName] || ruleName;
            }

            const srcLabel = source === 'live'
                ? '<span class="text-xs text-zinc-500">Live evaluation</span>'
                : '<span class="text-xs text-zinc-500">Last scan results</span>';
            let rhtml = srcLabel;

            if (evaluations.length === 0) {
                rhtml += '<p class="text-sm text-zinc-500">No matching rules for this item type.</p>';
                container.innerHTML = rhtml; return;
            }

            const totalBlocked = evaluations.reduce((n, ev) => n + ev.rules.filter(r => !r.passed).length, 0);
            if (totalBlocked === 0) {
                rhtml += `<p class="text-rose-500 font-medium">All checks passed across ${evaluations.length} rule${evaluations.length > 1 ? 's' : ''} \u2013 eligible for removal after grace period.</p>`;
            } else {
                rhtml += `<p class="text-emerald-500 font-medium">Protected by ${totalBlocked} check${totalBlocked > 1 ? 's' : ''} across ${evaluations.length} rule${evaluations.length > 1 ? 's' : ''}.</p>`;
            }

            for (const ev of evaluations) {
                const colSlug = (ev.collection || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                const blocked = ev.rules.filter(r => !r.passed);
                const badge = blocked.length === 0
                    ? '<span class="px-2 py-0.5 rounded-md text-xs font-semibold bg-rose-500/15 text-rose-500 ml-2">Eligible</span>'
                    : '<span class="px-2 py-0.5 rounded-md text-xs font-semibold bg-emerald-500/15 text-emerald-500 ml-2">Protected</span>';
                const meta = [ACTION_LABELS_R[ev.action] || ev.action || 'none', ev.grace_days ? ev.grace_days + 'd grace' : ''].filter(Boolean).join(' \u00b7 ');
                rhtml += `<details open class="mb-4"><summary class="cursor-pointer font-semibold text-base text-zinc-100">
                    <a href="/rules/${colSlug}" class="text-sky-500 hover:text-sky-400 no-underline">${ev.collection}</a>${badge}
                    <span class="ml-3 font-normal text-sm text-zinc-500">${meta}</span></summary>
                    <table class="w-full text-sm mt-2"><thead><tr class="border-b border-zinc-800"><th class="text-left py-2 px-3 text-zinc-400 font-medium">Check</th><th class="text-left py-2 px-3 text-zinc-400 font-medium w-28">Status</th><th class="text-left py-2 px-3 text-zinc-400 font-medium">Explanation</th></tr></thead><tbody class="divide-y divide-zinc-800">`;
                for (const r of ev.rules) {
                    const label = checkLabel(r.rule_name, ev);
                    const status = r.passed
                        ? '<span class="text-rose-500 whitespace-nowrap">Eligible</span>'
                        : '<span class="text-emerald-500 whitespace-nowrap">Protected</span>';
                    rhtml += `<tr><td class="py-2 px-3 text-zinc-100 font-medium">${label}</td><td class="py-2 px-3">${status}</td><td class="py-2 px-3 text-zinc-400">${r.detail || ''}</td></tr>`;
                }
                rhtml += '</tbody></table></details>';
            }
            container.innerHTML = rhtml;
        }

        fetch(`/api/items/${ratingKey}/evaluate`).then(r => r.json()).then(liveData => {
            if (liveData.error) {
                if (storedRules.length > 0) {
                    const grouped = {};
                    for (const r of storedRules) { const col = r.collection || 'Unknown'; if (!grouped[col]) grouped[col] = { collection: col, action: 'none', grace_days: 30, rules: [] }; grouped[col].rules.push(r); }
                    renderRules(Object.values(grouped), 'stored');
                } else {
                    const el = document.getElementById('rules-section');
                    if (el) el.innerHTML = '<p class="text-sm text-zinc-500">No rules evaluated yet.</p>';
                }
                return;
            }
            if (liveData.ratings) renderRatingsBadges(liveData.ratings);
            // Convert evaluations map {collection: [rules]} to array
            const evMap = liveData.evaluations || {};
            const evArr = Object.entries(evMap).map(([name, rules]) => ({ collection: name, rules: rules, action: 'none', grace_days: 30 }));
            if (evArr.length > 0) {
                renderRules(evArr, 'live');
            } else if (storedRules.length > 0) {
                const grouped = {};
                for (const r of storedRules) { const col = r.collection || 'Unknown'; if (!grouped[col]) grouped[col] = { collection: col, action: 'none', grace_days: 30, rules: [] }; grouped[col].rules.push(r); }
                renderRules(Object.values(grouped), 'stored');
            } else {
                const el = document.getElementById('rules-section');
                if (el) el.innerHTML = '<p class="text-sm text-zinc-500">No matching rules for this item type.</p>';
            }
        }).catch(() => {
            if (storedRules.length > 0) {
                const grouped = {};
                for (const r of storedRules) { const col = r.collection || 'Unknown'; if (!grouped[col]) grouped[col] = { collection: col, action: 'none', grace_days: 30, rules: [] }; grouped[col].rules.push(r); }
                renderRules(Object.values(grouped), 'stored');
            } else {
                const el = document.getElementById('rules-section');
                if (el) el.innerHTML = '<p class="text-sm text-zinc-500">No rules evaluated yet.</p>';
            }
        });

        // Seerr requests
        fetch(`/api/items/${ratingKey}/seerr-requests`).then(r => r.json()).then(seerr => {
            const section = document.getElementById('seerr-request-section');
            if (!section) return;
            const hasReqs = seerr.requests && seerr.requests.length > 0;
            const hasTags = seerr.tag_requesters && seerr.tag_requesters.length > 0;
            if (!hasReqs && !hasTags) { section.innerHTML = `<p class="text-zinc-500">No Seerr requests found${seerr.tmdb_id ? ' (TMDB: ' + seerr.tmdb_id + ')' : ''}.</p>`; return; }
            let sh = '';
            if (hasReqs) {
                const SC = { 1: 'text-zinc-400', 2: 'text-indigo-400', 3: 'text-rose-500', 4: 'text-indigo-400', 5: 'text-emerald-500' };
                sh += '<table class="w-full text-sm"><thead><tr class="border-b border-zinc-800"><th class="text-left py-2 px-3 text-zinc-400 font-medium">Requester</th><th class="text-left py-2 px-3 text-zinc-400 font-medium">Status</th><th class="text-left py-2 px-3 text-zinc-400 font-medium">Requested</th><th class="text-left py-2 px-3 text-zinc-400 font-medium">Updated</th></tr></thead><tbody class="divide-y divide-zinc-800">';
                for (const req of seerr.requests) {
                    const cls = SC[req.status] || 'text-zinc-400';
                    const av = req.requester_avatar ? `<img src="${req.requester_avatar}" class="w-5 h-5 rounded-full object-cover align-middle inline-block" alt="">` : '';
                    sh += `<tr><td class="py-2 px-3 text-zinc-100">${av} ${req.requester || 'Unknown'}</td><td class="py-2 px-3"><span class="${cls} font-medium">${req.status_label}</span></td><td class="py-2 px-3 text-zinc-300">${fmtDateTimeUTC(req.requested_at)}</td><td class="py-2 px-3 text-zinc-300">${fmtDateTimeUTC(req.updated_at)}</td></tr>`;
                }
                sh += '</tbody></table>';
            }
            if (hasTags) {
                if (hasReqs) sh += '<span class="text-xs text-zinc-500 block mt-3">Also from Radarr/Sonarr tags:</span>';
                sh += '<table class="w-full text-sm"><thead><tr class="border-b border-zinc-800"><th class="text-left py-2 px-3 text-zinc-400 font-medium">Requester</th><th class="text-left py-2 px-3 text-zinc-400 font-medium">Source</th></tr></thead><tbody class="divide-y divide-zinc-800">';
                for (const user of seerr.tag_requesters) sh += `<tr><td class="py-2 px-3 text-zinc-100 font-medium">${user}</td><td class="py-2 px-3 text-zinc-500">Radarr/Sonarr tag</td></tr>`;
                sh += '</tbody></table>';
            }
            section.innerHTML = sh;
        }).catch(() => {
            const el = document.getElementById('seerr-request-section');
            if (el) el.innerHTML = '<p class="text-zinc-500">Failed to fetch Seerr requests.</p>';
        });
    }
})
.catch(err => {
    document.getElementById('item-data').innerHTML = `<p class="text-rose-500">Error loading item: ${err.message}</p>`;
});
} // end if (ratingKey)

// ── Actions ──
let pendingDeleteBtn = null;

function toggleWatchDetail(id) {
    const r = document.getElementById(id);
    if (r) r.classList.toggle('hidden');
}

function confirmDelete(btn) {
    pendingDeleteBtn = btn;
    document.getElementById('delete-dialog').showModal();
}

document.getElementById('confirm-delete-btn').addEventListener('click', () => {
    document.getElementById('delete-dialog').close();
    if (pendingDeleteBtn) doAction('delete', pendingDeleteBtn);
});

function clearOverrideInline(btn) {
    if (!btn) return;
    btn.disabled = true; btn.textContent = '...';
    fetch(`/api/items/${ratingKey}/action`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action: 'clear'}) })
    .then(r => r.json()).then(d => {
        if (d.status === 'ok') { showToast('Override cleared', 'success'); const pill = btn.closest('span.inline-flex'); if (pill) pill.remove(); }
        else { showToast('Clear failed', 'error'); btn.disabled = false; btn.textContent = 'Clear'; }
    }).catch(() => { btn.disabled = false; btn.textContent = 'Clear'; });
}

function doAction(action, btn) {
    const result = document.getElementById('action-result');
    const allBtns = btn.parentElement.querySelectorAll('button');
    allBtns.forEach(b => { b.disabled = true; b.classList.add('opacity-50'); });
    btn.textContent = btn.textContent + '...';
    result.innerHTML = '';
    fetch(`/api/items/${ratingKey}/action`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action: action}) })
    .then(r => r.json()).then(data => {
        allBtns.forEach(b => { b.disabled = false; b.classList.remove('opacity-50'); });
        btn.textContent = btn.textContent.replace(/\.\.\.$/, '');
        if (data.status === 'ok') {
            const label = data.override || 'cleared';
            result.innerHTML = `<p class="text-emerald-500 text-sm font-medium">Override: <strong>${label}</strong></p>`;
            showToast('Override updated: ' + label, 'success');
        } else {
            result.innerHTML = `<p class="text-rose-500 text-sm font-medium">Error: ${data.detail || 'Unknown'}</p>`;
            showToast('Action failed', 'error');
        }
    }).catch(err => {
        allBtns.forEach(b => { b.disabled = false; b.classList.remove('opacity-50'); });
        btn.textContent = btn.textContent.replace(/\.\.\.$/, '');
        result.innerHTML = `<p class="text-rose-500 text-sm font-medium">Failed: ${err.message}</p>`;
    });
}

// ── Item search ──
const searchInput = document.getElementById('item-search');
const searchResults = document.getElementById('search-results');
const searchList = document.getElementById('search-results-list');
let searchTimeout = null;

searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    const q = this.value.trim();
    if (q.length < 2) { searchResults.classList.add('hidden'); return; }
    searchTimeout = setTimeout(() => {
        fetch('/api/items/search?q=' + encodeURIComponent(q)).then(r => r.json()).then(data => {
            if (!data.results || data.results.length === 0) {
                searchList.innerHTML = '<div class="px-3 py-3 text-zinc-500">No items found</div>';
            } else {
                searchList.innerHTML = data.results.map(item => {
                    const meta = [item.media_type || ''];
                    if (item.collection) meta.push(item.collection);
                    else if (item.source === 'plex') meta.push('Plex library');
                    const poster = `<img src="/api/items/${item.rating_key}/poster?size=sm" loading="lazy" decoding="async" alt="" class="shrink-0 rounded w-[30px] h-[45px] object-cover bg-zinc-800" onerror="this.style.visibility='hidden'">`;
                    return `<a href="/items/${item.rating_key}" class="flex items-center gap-3 px-3 py-2 no-underline border-b border-zinc-800 hover:bg-zinc-800 transition-colors">
                        ${poster}
                        <span class="flex-1 min-w-0 truncate">
                            <span class="font-semibold text-zinc-100">${item.title || item.rating_key}</span>
                            <span class="text-xs text-zinc-500 ml-2">${meta.join(' \u00b7 ')}</span>
                        </span>
                    </a>`;
                }).join('');
            }
            searchResults.classList.remove('hidden');
        });
    }, 300);
});

document.addEventListener('click', (e) => {
    if (!e.target.closest('#item-search') && !e.target.closest('#search-results')) searchResults.classList.add('hidden');
});

if (!ratingKey) searchInput.focus();
</script>
