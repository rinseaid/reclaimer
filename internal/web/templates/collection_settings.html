{{define "content"}}

<nav class="flex items-center gap-2 text-sm text-zinc-400 mb-6">
  <a href="/rules" class="text-sky-500 hover:text-sky-400">Rules</a>
  <span class="text-zinc-600">/</span>
  <a href="/rules/{{.Name}}" id="breadcrumb-collection" class="text-sky-500 hover:text-sky-400">{{titleize .Name}}</a>
  <span class="text-zinc-600">/</span>
  <span class="text-zinc-100">Settings</span>
</nav>

<div id="settings-body">
  <p class="text-zinc-400 text-sm animate-pulse">Loading configuration...</p>
</div>

<!-- Delete confirmation dialog (requires typing the rule name) -->
<dialog id="delete-dialog" class="bg-transparent backdrop:bg-black/60 p-0 open:flex open:items-center open:justify-center">
  <div class="bg-zinc-900 rounded-lg border border-zinc-800 p-6 max-w-md w-full shadow-xl">
    <h3 class="text-lg font-semibold text-zinc-100 mb-3">Delete Rule</h3>
    <p class="text-zinc-400 text-sm mb-3">
      This will delete rule <strong id="delete-rule-name" class="text-zinc-100">-</strong>
      and <strong id="delete-item-count" class="text-zinc-100">-</strong> tracked items. This cannot be undone.
    </p>
    <label class="block text-xs text-zinc-400 mb-1" for="delete-name-confirm">
      Type <span id="delete-rule-name-inline" class="font-mono text-zinc-200">-</span> to confirm:
    </label>
    <input type="text" id="delete-name-confirm" autocomplete="off" spellcheck="false"
           class="w-full mb-5 bg-zinc-950 border border-zinc-700 rounded-md px-3 py-2 text-sm text-zinc-100 focus:border-rose-500 focus:outline-none focus:ring-1 focus:ring-rose-500/50">
    <div class="flex gap-3 justify-end">
      <button class="px-4 py-2 text-sm rounded-md border border-zinc-600 text-zinc-300 hover:bg-zinc-800 transition-colors" onclick="document.getElementById('delete-dialog').close()">Cancel</button>
      <button id="delete-confirm-btn" disabled
              class="px-4 py-2 text-sm rounded-md bg-rose-500 text-white border-none transition-colors opacity-50 cursor-not-allowed"
              onclick="confirmDelete()">Delete Rule</button>
    </div>
    <div class="reclaimer-kbd-hint"><span>Press</span> <kbd class="reclaimer-kbd">Esc</kbd> <span>to close</span></div>
  </div>
</dialog>

<!-- Pipeline save confirmation dialog (for destructive pipelines) -->
<dialog id="pipeline-confirm-dialog" class="bg-transparent backdrop:bg-black/60 p-0 open:flex open:items-center open:justify-center">
  <div class="bg-zinc-900 rounded-lg border border-zinc-800 p-6 max-w-lg w-full shadow-xl">
    <h3 class="text-lg font-semibold text-zinc-100 mb-2">Confirm Destructive Actions</h3>
    <p class="text-zinc-400 text-sm mb-4" id="pipeline-confirm-summary">This rule will:</p>
    <p class="text-zinc-500 text-xs mb-6" id="pipeline-confirm-impact">&nbsp;</p>
    <div class="flex gap-3 justify-end">
      <button class="px-4 py-2 text-sm rounded-md border border-zinc-600 text-zinc-300 hover:bg-zinc-800 transition-colors" onclick="document.getElementById('pipeline-confirm-dialog').close()">Cancel</button>
      <button type="button" id="pipeline-confirm-save-btn"
              class="px-4 py-2 text-sm rounded-md bg-rose-500 hover:bg-rose-400 text-white transition-colors">Save</button>
    </div>
    <div class="reclaimer-kbd-hint"><span>Press</span> <kbd class="reclaimer-kbd">Esc</kbd> <span>to close</span></div>
  </div>
</dialog>

<!-- Toast container -->
<div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

<style>
  /* Chip input system - Tailwind equivalents */
  .chip-input-wrapper { position: relative; margin-top: 0.5rem; }
  .chip-input {
    display: flex; flex-wrap: wrap; gap: 0.35rem; padding: 0.4rem;
    border: 1px solid #3f3f46; border-radius: 0.375rem;
    background: #18181b; min-height: 1.8rem; align-items: center; cursor: text;
  }
  .chip-input:focus-within { border-color: #6366f1; }
  .chip-input input {
    border: none !important; background: transparent !important; outline: none !important;
    flex: 1; min-width: 8rem; padding: 0.2rem 0.4rem !important;
    font-size: 0.85rem; color: #f4f4f5; margin: 0; height: auto !important; line-height: 1.3;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.15rem 0.5rem; border-radius: 9999px;
    background: rgba(99,102,241,0.15); color: #a5b4fc;
    font-size: 0.8rem; font-weight: 500; white-space: nowrap;
  }
  .chip-remove {
    background: none; border: none; color: inherit; cursor: pointer;
    font-size: 1rem; line-height: 1; padding: 0; margin: 0; opacity: 0.7; width: auto;
  }
  .chip-remove:hover { opacity: 1; }
  .chip-suggestions {
    position: absolute; top: 100%; left: 0; right: 0;
    max-height: 200px; overflow-y: auto;
    background: #27272a; border: 1px solid #3f3f46; border-radius: 0.375rem;
    z-index: 100; margin-top: 2px;
  }
  .chip-suggestion { padding: 0.5rem 0.75rem; cursor: pointer; font-size: 0.9rem; color: #d4d4d8; }
  .chip-suggestion:hover { background: #3f3f46; }
  .chip-suggestion.highlighted { background: rgba(99,102,241,0.2); color: #c7d2fe; }

  /* Toggle switch styling */
  .tw-switch { position: relative; display: inline-flex; height: 1.25rem; width: 2.25rem; cursor: pointer; border-radius: 9999px; background: #3f3f46; transition: background 0.2s; }
  .tw-switch.active { background: #6366f1; }
  .tw-switch .tw-switch-knob { position: absolute; top: 2px; left: 2px; height: 0.95rem; width: 0.95rem; border-radius: 9999px; background: white; transition: transform 0.2s; }
  .tw-switch.active .tw-switch-knob { transform: translateX(1rem); }

  /* Dialog polyfill for open state */
  dialog[open] { display: flex; }
</style>

<script>
/* Shared toast helper */
window.showToast = function(message, kind) {
    kind = kind || 'success';
    const palette = {
        success: 'bg-emerald-500/15 border-emerald-500/40 text-emerald-300',
        error:   'bg-rose-500/15 border-rose-500/40 text-rose-300',
        info:    'bg-sky-500/15 border-sky-500/40 text-sky-300',
    };
    const cls = palette[kind] || palette.success;
    const container = document.getElementById('toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = `pointer-events-auto px-4 py-2.5 rounded-md border text-sm font-medium shadow-lg transition-all duration-200 opacity-0 translate-y-[-6px] ${cls}`;
    toast.textContent = message;
    container.appendChild(toast);
    requestAnimationFrame(() => {
        toast.classList.remove('opacity-0', 'translate-y-[-6px]');
    });
    setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-[-6px]');
        setTimeout(() => toast.remove(), 250);
    }, 3000);
};

function humanDays(d) {
    d = parseInt(d) || 0;
    if (d === 0) return 'immediately';
    const y = Math.floor(d / 365);
    const m = Math.floor((d % 365) / 30);
    const rem = d % 30;
    const parts = [];
    if (y > 0) parts.push(y + (y === 1 ? ' year' : ' years'));
    if (m > 0) parts.push(m + (m === 1 ? ' month' : ' months'));
    if (rem > 0 && y === 0) parts.push(rem + (rem === 1 ? ' day' : ' days'));
    return parts.join(', ') || d + ' days';
}
function updateDaysHint(input) {
    const hint = input.closest('label') ? input.closest('label').querySelector('.days-hint') : (input.parentElement && input.parentElement.querySelector('.days-hint'));
    if (hint) hint.textContent = '(' + humanDays(input.value) + ')';
}

// The switch span is wrapped in a <label> that natively forwards clicks to the
// hidden checkbox, which already flips the checkbox state and fires 'change'.
// We just mirror the final checkbox state into the switch's visual class --
// the actual flipping is handled by the browser's label-for-input behavior.
function toggleSwitch(el) {
  // Defer so the label's native click-forward runs first and the checkbox has
  // its final state before we read it.
  setTimeout(() => {
    const cb = el.previousElementSibling || el.querySelector('input[type="checkbox"]');
    if (cb && cb.type === 'checkbox') {
      el.classList.toggle('active', cb.checked);
    }
  }, 0);
}

const colName = "{{.Name}}";
let collectionConfig = null;

const DEFAULT_RULES = {
  // Criteria
  never_watched: {
    enabled: true, check_plex_views: true, check_db_plays: true,
    min_days_unwatched: 0, exclude_users: []
  },
  not_watched_recently: { enabled: false, days: 90 },
  show_ended: { enabled: false, include_deleted: true },
  low_rating: { enabled: false, imdb_max: 5.0, critic_max: 50, require_all: false },
  file_size_min: { enabled: false, min_gb: 20 },
  release_year_before: { enabled: false, year: 2000 },
  watch_ratio_low: { enabled: false, max_percent: 30, require_plays: true },
  old_season: { enabled: false, keep_last: 2 },
  old_content: { enabled: false, days: 180 },
  request_fulfilled: { enabled: false },
  available_on_debrid: { enabled: false },
  // Protections
  no_keep_tag: { enabled: false, protected_tags: [] },
  no_active_request: { enabled: true },
  no_protected_request: { enabled: true },
  not_in_keep_collection: { enabled: false, protected_collections: [] },
  highly_rated: { enabled: false, imdb_min: 7.0, rt_min: 70, metacritic_min: 70, require_all: false },
  recently_added: { enabled: false, days: 14 },
  partially_watched: { enabled: false, days: 30 },
  on_watchlist: { enabled: false },
  plex_favorited: { enabled: false },
  series_protection: { enabled: false },
};

let allUsers = [];
let allLibraries = [];
let allPlexCollections = [];

const chipInputs = {};

function mergeRules(defaults, saved) {
  const result = {};
  for (const [key, def] of Object.entries(defaults)) {
    result[key] = saved && saved[key] ? { ...def, ...saved[key] } : { ...def };
  }
  return result;
}

function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('[data-tab]').forEach(a => {
    a.classList.remove('border-indigo-500', 'text-zinc-100', 'font-semibold');
    a.classList.add('border-transparent', 'text-zinc-400');
  });
  const panel = document.getElementById('tab-' + name);
  if (panel) panel.style.display = '';
  const tab = document.querySelector(`[data-tab="${name}"]`);
  if (tab) {
    tab.classList.remove('border-transparent', 'text-zinc-400');
    tab.classList.add('border-indigo-500', 'text-zinc-100', 'font-semibold');
  }
  return false;
}

function loadConfig() {
  fetch(`/api/collections/${colName}/config`)
    .then(r => {
      if (r.status === 404) {
        document.getElementById('settings-body').innerHTML = `
          <div class="text-center py-12 px-4 border-2 border-dashed border-zinc-700 rounded-lg">
            <h3 class="text-lg font-semibold text-zinc-100 mb-2">Rule Not Found</h3>
            <p class="text-zinc-500 mb-6">No configuration found for "${colName.replace(/-/g, ' ')}".</p>
            <p class="text-zinc-500 text-sm">This rule may have been deleted, or the URL may be incorrect.</p>
            <a href="/rules" class="inline-flex px-4 py-2 mt-4 rounded-md border border-zinc-600 text-sm text-zinc-300 hover:bg-zinc-800 transition-colors">Back to Rules</a>
          </div>`;
        return null;
      }
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(cfg => {
      if (!cfg) return;
      collectionConfig = cfg;

      document.getElementById('breadcrumb-collection').textContent = cfg.name || colName;

      let criteria = {};
      if (typeof cfg.criteria === 'string' && cfg.criteria) {
        try { criteria = JSON.parse(cfg.criteria); } catch(e) {}
      } else if (typeof cfg.criteria === 'object' && cfg.criteria) {
        criteria = cfg.criteria;
      }

      const rules = mergeRules(DEFAULT_RULES, criteria.rules || {});
      const behavior = {
        delete_files: criteria.delete_files ?? false,
        add_import_exclusion: criteria.add_import_exclusion ?? true,
      };
      const savedPipeline = criteria.action_pipeline || [];
      if (!savedPipeline.length && cfg.action && cfg.action !== 'none') {
        if (criteria.pre_action_script) savedPipeline.push({ type: 'script', command: criteria.pre_action_script });
        if (cfg.action === 'delete') {
          if (criteria.delete_files) savedPipeline.push({ type: 'delete_files', command: '' });
          savedPipeline.push({ type: 'delete', command: '' });
          if (criteria.add_import_exclusion) savedPipeline.push({ type: 'import_exclusion', command: '' });
        } else {
          savedPipeline.push({ type: cfg.action, command: '' });
        }
        if (criteria.post_action_script) savedPipeline.push({ type: 'script', command: criteria.post_action_script });
      }
      const protectedUsers = criteria.protected_users || [];
      const savedLibrarySection = criteria.library_section_id || null;
      const savedLibrarySource = criteria.library_source || 'plex';
      const savedGranularity = criteria.granularity || 'show';
      const isShow = cfg.media_type === 'show';

      // Inputs for rules that use days/thresholds keyed by the canonical
      // rule name. Used to prefill the Criteria-tab cards that don't fit
      // neatly into the cardHtml(options) slot.
      const nwr = rules.not_watched_recently || {};
      const old = rules.old_content || {};
      const newCriteria = {
        not_watched_recently_enabled: !!nwr.enabled,
        not_watched_recently_days: typeof nwr.days === 'number' ? nwr.days : 90,
        old_content_enabled: !!old.enabled,
        old_content_days: typeof old.days === 'number' ? old.days : 180,
      };

      const protectedTags = criteria.protected_tags || [];
      const protectedCollections = criteria.protected_collections || [];

      Promise.all([
        fetch('/api/users').then(r => r.json()).catch(() => []),
        fetch('/api/settings/plex-libraries').then(r => r.json()).catch(() => ({ libraries: [] })),
        fetch('/api/settings/jellyfin-libraries').then(r => r.json()).catch(() => ({ libraries: [] })),
        fetch('/api/settings/plex-collections').then(r => r.json()).catch(() => ({ collections: [] })),
        fetch('/api/settings/arr-tags').then(r => r.json()).catch(() => ({ tags: [] })),
        fetch('/api/settings/recycle-bin-status').then(r => r.json()).catch(() => ({})),
        fetch('/api/instances').then(r => r.json()).catch(() => ({ instances: [] })),
      ]).then(([users, plexData, jfData, plexCollections, arrTagsData, recycleData, instancesData]) => {
        allUsers = users;
        allPlexCollections = (plexCollections.collections || []);
        window._arrTags = (arrTagsData.tags || []);
        window._instances = (instancesData.instances || []);
        // {radarr: {configured, path, reason}, sonarr: {...}}. Rule editor
        // reads this when flagging delete / delete_files steps whose target
        // arr has no recycle-bin safety net configured.
        window._recycleBinStatus = recycleData || {};
        const plexLibs = (plexData.libraries || []).map(l => ({...l, source: 'plex'}));
        const jfLibs = (jfData.libraries || []).map(l => ({...l, source: 'jellyfin'}));
        allLibraries = [...plexLibs, ...jfLibs];
        pipelineSteps = savedPipeline;
        const dlCollections = document.getElementById('dl-collections') || document.createElement('datalist');
        dlCollections.id = 'dl-collections';
        dlCollections.innerHTML = allPlexCollections.map(c => `<option value="${c}">`).join('');
        if (!dlCollections.parentNode) document.body.appendChild(dlCollections);
        const dlTags = document.getElementById('dl-tags') || document.createElement('datalist');
        dlTags.id = 'dl-tags';
        dlTags.innerHTML = (window._arrTags || []).map(t => `<option value="${t}">`).join('');
        if (!dlTags.parentNode) document.body.appendChild(dlTags);
        renderSettings(cfg, rules, behavior, protectedUsers, protectedTags, protectedCollections, isShow, savedLibrarySection, savedLibrarySource, newCriteria, savedGranularity);
      });
    })
    .catch(err => {
      document.getElementById('settings-body').innerHTML =
        `<p class="text-rose-500 text-sm">Error loading config: ${err.message}</p>`;
    });
}

function buildLibraryOptions(savedLibrarySection, savedLibrarySource, cfgMediaType) {
  if (allLibraries.length === 0) return '<option value="">No libraries found</option>';
  const plexLibs = allLibraries.filter(l => l.source === 'plex');
  const jfLibs = allLibraries.filter(l => l.source === 'jellyfin');
  let html = '';
  if (plexLibs.length > 0) {
    html += '<optgroup label="Plex">';
    html += plexLibs.map(lib => {
      const libType = lib.type === 'show' ? 'show' : 'movie';
      const sectionId = lib.id;
      const isSelected = savedLibrarySection
        ? savedLibrarySection == sectionId && savedLibrarySource === 'plex'
        : libType === cfgMediaType;
      return `<option value="${sectionId}" data-type="${libType}" data-source="plex"${isSelected ? ' selected' : ''}>${lib.title}</option>`;
    }).join('');
    html += '</optgroup>';
  }
  if (jfLibs.length > 0) {
    html += '<optgroup label="Jellyfin">';
    html += jfLibs.map(lib => {
      const libType = lib.type === 'show' ? 'show' : 'movie';
      const libId = lib.id;
      const isSelected = savedLibrarySection
        ? savedLibrarySection == libId && savedLibrarySource === 'jellyfin'
        : false;
      return `<option value="${libId}" data-type="${libType}" data-source="jellyfin"${isSelected ? ' selected' : ''}>${lib.title}</option>`;
    }).join('');
    html += '</optgroup>';
  }
  return html;
}

function createChipInput(cfg) {
  const container = document.getElementById(cfg.containerId);
  if (!container) return null;

  let values = [...(cfg.initialValues || [])];
  const suggestions = cfg.suggestions || [];
  const allowFreeform = cfg.allowFreeform !== false;
  const renderChipContent = cfg.renderChip || (v => v);
  const renderSuggestionContent = cfg.renderSuggestion || (v => v);
  const onChange = cfg.onChange || (() => {});
  let highlightedIdx = -1;

  function render() {
    let html = '<div class="chip-input">';
    values.forEach((val, i) => {
      html += `<span class="chip">${renderChipContent(val)} <button class="chip-remove" data-idx="${i}" type="button">&times;</button></span>`;
    });
    html += `<input type="text" placeholder="${cfg.placeholder || 'Type and press Enter...'}" />`;
    html += '</div>';
    if (suggestions.length > 0) {
      html += '<div class="chip-suggestions" style="display:none;"></div>';
    }
    container.innerHTML = html;
    container.className = 'chip-input-wrapper';

    const chipInputEl = container.querySelector('.chip-input');
    const inputEl = container.querySelector('input');
    const suggestionsEl = container.querySelector('.chip-suggestions');

    chipInputEl.addEventListener('click', () => inputEl.focus());

    container.querySelectorAll('.chip-remove').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.getAttribute('data-idx'));
        values.splice(idx, 1);
        render();
        onChange(values);
      });
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (highlightedIdx >= 0 && suggestionsEl) {
          const items = suggestionsEl.querySelectorAll('.chip-suggestion');
          if (items[highlightedIdx]) {
            addValue(items[highlightedIdx].getAttribute('data-value'));
            return;
          }
        }
        if (allowFreeform && inputEl.value.trim()) {
          addValue(inputEl.value.trim());
        }
      } else if (e.key === 'Backspace' && !inputEl.value && values.length > 0) {
        values.pop();
        render();
        onChange(values);
      } else if (e.key === 'ArrowDown' && suggestionsEl && suggestionsEl.style.display !== 'none') {
        e.preventDefault();
        const items = suggestionsEl.querySelectorAll('.chip-suggestion');
        highlightedIdx = Math.min(highlightedIdx + 1, items.length - 1);
        updateHighlight(items);
      } else if (e.key === 'ArrowUp' && suggestionsEl && suggestionsEl.style.display !== 'none') {
        e.preventDefault();
        const items = suggestionsEl.querySelectorAll('.chip-suggestion');
        highlightedIdx = Math.max(highlightedIdx - 1, 0);
        updateHighlight(items);
      } else if (e.key === 'Escape' && suggestionsEl) {
        suggestionsEl.style.display = 'none';
        highlightedIdx = -1;
      }
    });

    inputEl.addEventListener('input', () => {
      if (!suggestionsEl) return;
      const query = inputEl.value.toLowerCase().trim();
      if (!query) {
        suggestionsEl.style.display = 'none';
        highlightedIdx = -1;
        return;
      }
      const filtered = suggestions.filter(s =>
        s.toLowerCase().includes(query) && !values.includes(s)
      );
      if (filtered.length === 0) {
        suggestionsEl.style.display = 'none';
        highlightedIdx = -1;
        return;
      }
      suggestionsEl.innerHTML = filtered.map((s, i) =>
        `<div class="chip-suggestion" data-value="${s}">${renderSuggestionContent(s)}</div>`
      ).join('');
      suggestionsEl.style.display = '';
      highlightedIdx = -1;

      suggestionsEl.querySelectorAll('.chip-suggestion').forEach(el => {
        el.addEventListener('click', () => {
          addValue(el.getAttribute('data-value'));
        });
      });
    });

    inputEl.addEventListener('blur', () => {
      setTimeout(() => {
        if (suggestionsEl) suggestionsEl.style.display = 'none';
        highlightedIdx = -1;
      }, 200);
    });
  }

  function updateHighlight(items) {
    items.forEach((el, i) => {
      el.classList.toggle('highlighted', i === highlightedIdx);
    });
    if (items[highlightedIdx]) {
      items[highlightedIdx].scrollIntoView({ block: 'nearest' });
    }
  }

  function addValue(val) {
    if (!val || values.includes(val)) return;
    values.push(val);
    render();
    onChange(values);
    const inputEl = container.querySelector('input');
    if (inputEl) inputEl.focus();
  }

  render();

  const instance = {
    getValues: () => [...values],
    setValues: (newVals) => { values = [...newVals]; render(); },
  };
  chipInputs[cfg.containerId] = instance;
  return instance;
}

/* Collapsible section wrapper using native <details>.
   Open/closed state is persisted to localStorage per section key so it
   survives navigation. */
function sectionHtml(sectionKey, title, innerHtml, opts) {
  opts = opts || {};
  let openAttr = opts.defaultClosed ? '' : 'open';
  try {
    const saved = localStorage.getItem('reclaimer-section-' + sectionKey);
    if (saved === 'closed') openAttr = '';
    else if (saved === 'open') openAttr = 'open';
  } catch (_) {}
  return `<details class="mb-4 group" data-section-key="${sectionKey}"${openAttr ? ' ' + openAttr : ''}>
    <summary class="cursor-pointer text-sm font-semibold text-zinc-300 mb-2 list-none flex items-center gap-2 select-none">
      <svg class="w-3 h-3 transition-transform group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
      <span>${title}</span>
    </summary>
    <div class="mt-2">${innerHtml}</div>
  </details>`;
}

function cardHtml(id, title, desc, enabled, optionsHtml, extraClass) {
  const dimmedCls = enabled ? '' : ' opacity-50';
  const extra = extraClass ? ` ${extraClass}` : '';
  const optVisibility = enabled ? '' : ' invisible opacity-0';
  const opts = optionsHtml
    ? `<div class="ml-auto flex items-center gap-3 shrink-0${optVisibility}" id="${id}-options">${optionsHtml}</div>`
    : '';
  return `<div class="bg-zinc-900 rounded-lg p-4 border border-zinc-800 mb-2 transition-opacity${dimmedCls}${extra}" id="card-${id}">
    <div class="flex items-center gap-3 min-h-[2.5rem]">
      <label class="mb-0 shrink-0 flex items-center">
        <input type="checkbox" id="${id}-enabled" ${enabled ? 'checked' : ''} onchange="toggleCard('${id}')" class="hidden">
        <span class="tw-switch ${enabled ? 'active' : ''}" onclick="toggleSwitch(this)"><span class="tw-switch-knob"></span></span>
      </label>

          <svg class="w-3 h-3 transition-transform group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          Script environment variables
        </summary>
        <div class="mt-2 p-3 bg-zinc-900 rounded-lg border border-zinc-800 text-[0.7rem] text-zinc-500 font-mono leading-relaxed">
          RECLAIMER_ITEM_TITLE &middot; RECLAIMER_ITEM_RATING_KEY &middot; RECLAIMER_ITEM_MEDIA_TYPE &middot; RECLAIMER_ITEM_COLLECTION &middot;
          RECLAIMER_ITEM_TMDB_ID &middot; RECLAIMER_ITEM_TVDB_ID &middot; RECLAIMER_ITEM_IMDB_ID &middot;
          RECLAIMER_ITEM_SIZE_BYTES &middot; RECLAIMER_RADARR_ID &middot; RECLAIMER_SONARR_ID &middot; RECLAIMER_RADARR_URL &middot; RECLAIMER_SONARR_URL
        </div>
      </details>
    </div><!-- /tab-action -->

    <!-- BOTTOM BAR -->
    <div class="flex gap-3 items-center flex-wrap mt-8 pt-4 border-t border-zinc-800">
      <button id="cfg-save" onclick="saveConfig()"
              class="px-5 py-2 text-sm font-medium rounded-md bg-indigo-600 hover:bg-indigo-700 text-white transition-colors">Save</button>
      <span id="cfg-status" class="text-sm text-zinc-500"></span>
      <span class="ml-auto"></span>
      <button class="px-4 py-2 text-sm rounded-md border border-rose-500/50 text-rose-500 hover:bg-rose-500/10 transition-colors"
              onclick="openDeleteDialog()">Delete Rule</button>
    </div>
  `;

  // Wire up granularity change listener -> re-apply TV-season gating.
  document.querySelectorAll('input[name="granularity"]').forEach(r => {
    r.addEventListener('change', applyGranularityVisibility);
  });

  // Initialize pipeline
  renderPipeline();

  // Initialize chip inputs
  createChipInput({
    containerId: 'protect-tags',
    placeholder: 'Type a tag and press Enter...',
    initialValues: protectedTags,
    suggestions: window._arrTags || [],
    allowFreeform: true,
    onChange: () => updateSummaryCard(),
  });

  const userSuggestions = allUsers.map(u => u.username);
  const userAvatarMap = {};
  allUsers.forEach(u => {
    const thumb = u.thumb || u.avatar || '';
    if (thumb) userAvatarMap[u.username] = thumb;
  });
  function userAvatarHtml(username, size) {
      const sz = size || 18;
      const thumb = userAvatarMap[username];
      const letter = (username || '?')[0].toUpperCase();
      const fontPx = Math.round(sz * 0.55);
      const fallback = `<span class="absolute inset-0 rounded-full bg-zinc-700 text-zinc-300 flex items-center justify-center font-semibold" style="font-size:${fontPx}px;">${letter}</span>`;
      // Wrap letter + img so a broken image URL (Plex avatar 403/503) falls back cleanly.
      return `<span class="relative inline-flex align-middle" style="width:${sz}px;height:${sz}px;">${fallback}${thumb ? `<img src="${thumb}" class="relative rounded-full object-cover" style="width:${sz}px;height:${sz}px;" alt="" onerror="this.style.display='none'">` : ''}</span>`;
  }

  createChipInput({
    containerId: 'protect-users',
    placeholder: 'Type a username...',
    initialValues: protectedUsers,
    suggestions: userSuggestions,
    allowFreeform: true,
    renderChip: (u) => `${userAvatarHtml(u)} ${u}`,
    renderSuggestion: (u) => `<span class="flex items-center gap-2">${userAvatarHtml(u, 22)} ${u}</span>`,
    onChange: () => updateSummaryCard(),
  });

  createChipInput({
    containerId: 'protect-collections',
    placeholder: 'Type a collection name...',
    initialValues: protectedCollections,
    suggestions: allPlexCollections,
    allowFreeform: true,
    onChange: () => updateSummaryCard(),
  });

  // Persist collapsible section open/closed state per section key.
  document.querySelectorAll('details[data-section-key]').forEach(det => {
    det.addEventListener('toggle', () => {
      const key = det.getAttribute('data-section-key');
      if (!key) return;
      try {
        localStorage.setItem('reclaimer-section-' + key, det.open ? 'open' : 'closed');
      } catch (_) {}
    });
  });

  // Attach inline help tooltips to every criterion/protection title.
  attachTooltips();

  // Trigger cron preview + validation for any prefilled cron string so
  // the user sees "Next: <...>" immediately on load (or the error for an
  // invalid saved cron).
  const cronInput = document.getElementById('cfg-schedule-cron');
  if (cronInput) updateCronPreview(cronInput);

  // Wire live summary + compute once from initial state.
  wireLiveSummary();
  updateSummaryCard();
}

/* ------------------------------------------------------------------
   Inline help tooltips.

   The tooltip utility itself (`.reclaimer-tooltip` + data-tooltip) lives in
   base.html. This map describes every card / section we want to annotate;
   `attachTooltips()` walks the DOM after render and injects a (?) badge
   next to each known title.
------------------------------------------------------------------ */
const CRITERIA_TOOLTIPS = {
  // Card-based criteria (keyed by card id passed to cardHtml()).
  // never_watched has no dedicated card - it is derived from Plex viewCount
  // / Jellyfin UserData.Played + our local watch history.
  'not-watched-recently': "Last play was longer ago than the threshold. Items that have never been played are flagged once they've been in the library longer than the threshold.",
  'low-rating':           "Flag items whose audience or critic rating falls below your threshold. Companion to the Rating protection on the Protections tab - together they let a rule flag bad ratings and keep good ones.",
  'file-size-min':        "Flag items whose primary video file is at least this large. Useful for reclaiming storage. Size is taken from the source file, not from the transcode cache.",
  'release-year-before':  "Item was released before this year. Uses the release year from Plex/Jellyfin metadata.",
  'watch-ratio-low':      "Every play of this item stopped before reaching this completion percentage. Good for spotting things nobody could finish.",
  'old-content':          "Flag items added to the library longer ago than the threshold, regardless of watch status. Companion to the Library age protection on the Protections tab.",
  'old-season':           "Season is older than the last N seasons of its show. Keeps recent seasons, targets the back catalogue. TV rules with season granularity only.",
  'show-ended':           "Sonarr reports the series as Ended, Cancelled, or Deleted. Does not fire for shows Sonarr still considers Continuing.",
  // Protection cards
  'active-request':       "Protect if the item has an active Seerr request from someone who hasn't watched it yet. Once the requester watches it, the protection lifts automatically.",
  'recently-added':       "Keep items added in the last N days so fresh additions don't get nuked before anyone has a chance to watch them. Companion to the Library age criterion on the Removal Criteria tab.",
  'partially-watched':    "Keep items someone started watching but didn't finish within the last N days. Uses Plex viewOffset and play history.",
  'on-watchlist':         "Protect items on any user's Plex watchlist (fetched via Overseerr).",
  'plex-favorited':       "Protect items you've hearted in Plex (rating = 10 on the user object).",
  'highly-rated':         "Keep items whose audience or critic rating meets your threshold. Companion to the Rating criterion on the Removal Criteria tab.",
  'series-protection':    "Protect all seasons of a show if any of the protections above apply to the show itself. TV rules with season granularity only.",
};
const SECTION_TOOLTIPS = {
  // Heading-text based. These show up as non-card <div class="font-semibold"> blocks
  // where the text is an exact, stable label.
  'Protected tags':        "Protect if the item has any of the listed tags in Radarr/Sonarr. Tags are matched case-insensitively.",
  'Protected users':       "Protect if any of your listed protected users requested, favorited, or watched the item. Users here override everything in the Criteria tab.",
  'Protected collections': "Protect if the item lives in any of the listed Plex/Jellyfin collections. Handy for \"permanent\" / curated collections.",
};

function tooltipBadge(text) {
  // Use a <button> so keyboard users get focus navigation for free.
  // Text content is "?" but the attr is what renders in the bubble.
  const escaped = String(text).replace(/"/g, '&quot;');
  return `<button type="button" class="reclaimer-tooltip ml-1.5" data-tooltip="${escaped}" aria-label="More info" tabindex="0">?</button>`;
}

function clampTooltipToViewport(el) {
  // Auto-apply edge classes so the bubble never clips.
  el.classList.remove('reclaimer-tooltip--left', 'reclaimer-tooltip--right', 'reclaimer-tooltip--above');
  const r = el.getBoundingClientRect();
  const halfBubble = 140; // max-width 280px / 2
  if (r.left - halfBubble < 8)               el.classList.add('reclaimer-tooltip--left');
  else if (r.right + halfBubble > window.innerWidth - 8) el.classList.add('reclaimer-tooltip--right');
  if (r.bottom + 180 > window.innerHeight)   el.classList.add('reclaimer-tooltip--above');
}

function attachTooltips() {
  // Cards: <div id="card-<id>"> ... <div class="font-semibold ...">title</div>
  Object.entries(CRITERIA_TOOLTIPS).forEach(([cardId, text]) => {
    const card = document.getElementById('card-' + cardId);
    if (!card) return;
    const titleEl = card.querySelector('.font-semibold');
    if (!titleEl || titleEl.querySelector('.reclaimer-tooltip')) return;
    titleEl.insertAdjacentHTML('beforeend', tooltipBadge(text));
  });
  // Non-card sections: look for font-semibold divs whose text matches a key.
  document.querySelectorAll('#settings-body .font-semibold').forEach(el => {
    if (el.querySelector('.reclaimer-tooltip')) return;
    const txt = (el.textContent || '').trim();
    if (SECTION_TOOLTIPS[txt]) {
      el.insertAdjacentHTML('beforeend', tooltipBadge(SECTION_TOOLTIPS[txt]));
    }
  });
  // Wire edge-clamping. Recompute on focus/hover in case the layout shifted.
  document.querySelectorAll('.reclaimer-tooltip').forEach(el => {
    const handler = () => clampTooltipToViewport(el);
    el.addEventListener('mouseenter', handler);
    el.addEventListener('focus', handler);
  });
}

/* ------------------------------------------------------------------

/* Summarise the per-rule schedule + priority from the Advanced section.
   Returns [] if nothing non-default is set. */
function describeSchedule() {

function joinList(items) {
  if (items.length === 0) return '';
  if (items.length === 1) return items[0];
  if (items.length === 2) return items[0] + ' and ' + items[1];
  return items.slice(0, -1).join(', ') + ', and ' + items[items.length - 1];
}

/* ------------------------------------------------------------------
   Cron validator + next-run preview.

   Intentionally minimal: the backend parses with croniter / a standard
   5-field crontab (minute hour day-of-month month day-of-week). We only
   accept the same 5-field syntax here. A field is one of:
     *                             - any value
     N                             - a single integer in-range
     N-M                           - an inclusive range
     *\/S or N-M/S                 - step
     a,b,c                         - comma list of any of the above

   MIN     0-59
   HOUR    0-23
   DOM     1-31
   MONTH   1-12
   DOW     0-7  (0 and 7 both mean Sunday)

   We deliberately DO NOT support named months/DOWs (JAN, SUN, ...) or
   the @hourly / @daily macros - if the backend ever accepts those we
   can extend here. Keep the grammar conservative so we never accept a
   cron the backend will reject.
------------------------------------------------------------------ */
const CRON_FIELD_RANGES = [
  { name: 'minute', min: 0, max: 59 },
  { name: 'hour',   min: 0, max: 23 },
  { name: 'dom',    min: 1, max: 31 },
  { name: 'month',  min: 1, max: 12 },
  { name: 'dow',    min: 0, max: 7  },
];

function _validateCronField(field, range) {
  // A cron field is a comma-separated list. Each element is one of:
  //   *         |  *\/S
  //   N         |  N-M        |  N-M/S
  // We validate each element in isolation.
  if (typeof field !== 'string' || field.length === 0) return false;
  const parts = field.split(',');
  for (const raw of parts) {
    const p = raw.trim();
    if (!p) return false;
    let body = p, step = null;
    const slash = p.indexOf('/');
    if (slash >= 0) {
      body = p.slice(0, slash);
      const stepStr = p.slice(slash + 1);
      if (!/^\d+$/.test(stepStr)) return false;
      step = parseInt(stepStr, 10);
      if (step < 1) return false;
    }
    if (body === '*') continue;
    const dash = body.indexOf('-');
    if (dash >= 0) {
      const a = body.slice(0, dash);
      const b = body.slice(dash + 1);
      if (!/^\d+$/.test(a) || !/^\d+$/.test(b)) return false;
      const na = parseInt(a, 10), nb = parseInt(b, 10);
      if (na < range.min || nb > range.max || na > nb) return false;
    } else {
      if (!/^\d+$/.test(body)) return false;
      const n = parseInt(body, 10);
      if (n < range.min || n > range.max) return false;
    }
  }
  return true;
}

function validateCron(expr) {
  // Returns { ok: true } or { ok: false, error: '...' }
  if (typeof expr !== 'string') return { ok: false, error: 'not a string' };
  const trimmed = expr.trim();
  if (!trimmed) return { ok: true, empty: true };
  const fields = trimmed.split(/\s+/);
  if (fields.length !== 5) {
    return { ok: false, error: 'expected 5 space-separated fields (minute hour day-of-month month day-of-week)' };
  }
  for (let i = 0; i < 5; i++) {
    const range = CRON_FIELD_RANGES[i];
    if (!_validateCronField(fields[i], range)) {
      return { ok: false, error: `invalid ${range.name} field: "${fields[i]}"` };
    }
  }
  return { ok: true };
}

/* Minimal "next matching date" finder. Brute-forces forward from the
   current minute, up to a safety ceiling (2 years). Good enough for a
   preview; the backend is the source of truth at scheduling time. */
function cronFieldMatches(field, value, range) {
  // Same grammar as _validateCronField. Returns true if value is in the set
  // described by the field. Assumes field is already validated.
  for (const raw of field.split(',')) {
    const p = raw.trim();
    let body = p, step = null;
    const slash = p.indexOf('/');
    if (slash >= 0) {
      body = p.slice(0, slash);
      step = parseInt(p.slice(slash + 1), 10);
    }
    let a, b;
    if (body === '*') { a = range.min; b = range.max; }
    else if (body.indexOf('-') >= 0) {
      const [aa, bb] = body.split('-');
      a = parseInt(aa, 10); b = parseInt(bb, 10);
    } else {
      a = b = parseInt(body, 10);
    }
    if (value < a || value > b) continue;
    if (step === null || step === 1) return true;
    if ((value - a) % step === 0) return true;
  }
  return false;
}

function findNextCronRun(expr, fromDate) {
  const v = validateCron(expr);
  if (!v.ok || v.empty) return null;
  const fields = expr.trim().split(/\s+/);
  const [mF, hF, domF, monF, dowF] = fields;
  // Start from the next minute so "0 2 * * *" right after 02:00 doesn't
  // return the current minute (we're looking for the NEXT run).
  const d = new Date(fromDate.getTime());
  d.setSeconds(0, 0);
  d.setMinutes(d.getMinutes() + 1);
  const ceiling = new Date(d.getTime() + 366 * 2 * 24 * 60 * 60 * 1000);
  while (d < ceiling) {
    const minOk  = cronFieldMatches(mF,   d.getMinutes(),  CRON_FIELD_RANGES[0]);
    const hourOk = cronFieldMatches(hF,   d.getHours(),    CRON_FIELD_RANGES[1]);
    const domOk  = cronFieldMatches(domF, d.getDate(),     CRON_FIELD_RANGES[2]);
    const monOk  = cronFieldMatches(monF, d.getMonth()+1,  CRON_FIELD_RANGES[3]);
    // DOW: JS getDay is 0-6 (Sun-Sat); cron 0 and 7 both mean Sunday.
    const jsDow = d.getDay();
    const dowOk = cronFieldMatches(dowF, jsDow, CRON_FIELD_RANGES[4]) ||
                  (jsDow === 0 && cronFieldMatches(dowF, 7, CRON_FIELD_RANGES[4]));
    if (minOk && hourOk && monOk && domOk && dowOk) return d;
    d.setMinutes(d.getMinutes() + 1);
  }
  return null;
}

function formatCronNext(d) {
  if (!d) return '';
  // Concise "DayOfWeek, Mon DD HH:MM" - good at-a-glance. The date library
  // dance keeps output stable across locales without adding a dep.
  const dow   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  const mon   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  const day   = d.getDate();
  const hh    = String(d.getHours()).padStart(2, '0');
  const mm    = String(d.getMinutes()).padStart(2, '0');
  return `${dow}, ${mon} ${day} ${hh}:${mm}`;
}

function updateCronPreview(input) {
  const preview = document.getElementById('cfg-schedule-cron-preview');
  if (!preview) return;
  const raw = input.value;
  const v = validateCron(raw);
  if (v.empty) {
    preview.textContent = '';
    preview.className = 'text-xs mt-1';
    input.classList.remove('border-rose-500');
    return;
  }
  if (!v.ok) {
    preview.textContent = 'Invalid cron: ' + v.error;
    preview.className = 'text-xs mt-1 text-rose-400';
    input.classList.add('border-rose-500');
    return;
  }
  const next = findNextCronRun(raw, new Date());
  if (next) {
    preview.textContent = 'Next: ' + formatCronNext(next);
    preview.className = 'text-xs mt-1 text-emerald-400';
  } else {
    preview.textContent = 'Valid cron, but no matching run in the next two years.';
    preview.className = 'text-xs mt-1 text-amber-400';
  }
  input.classList.remove('border-rose-500');
}

function updateSummaryCard() {
  const target = document.getElementById('rule-summary-text');
  const wrap = document.getElementById('rule-summary');
  if (!target || !wrap) return;

  const criteria    = describeCriteria();
  const protections = describeProtections();
  const actions     = describeActions();
  const schedule    = describeSchedule();
  const graceDays   = _cfgNum('cfg-grace-days', 30);

  // Schedule/priority is appended as a standalone clause at the end,
  // so it can be composed with the "empty criteria" short form too.
  const scheduleStr = schedule.length > 0 ? ' ' + capitaliseFirst(joinList(schedule)) + '.' : '';

  // Special-case notes first.
  if (criteria.length === 0) {
    target.className = 'text-sm';
    target.innerHTML =
      '<span class="text-zinc-500 text-xs uppercase tracking-wide font-semibold mr-2">Summary</span>' +
      '<span class="text-amber-400">No enabled criteria</span>' +
      '<span class="text-zinc-300"> - nothing will match.' + scheduleStr + '</span>';
    wrap.className = 'mb-5 px-4 py-3 rounded-lg bg-amber-500/5 border border-amber-500/20 text-sm text-zinc-300 leading-relaxed';
    return;
  }
  // Reset to the default indigo wrap class.
  wrap.className = 'mb-5 px-4 py-3 rounded-lg bg-indigo-500/5 border border-indigo-500/20 text-sm text-zinc-300 leading-relaxed';

  const criteriaStr    = 'flags items that are ' + joinList(criteria);
  const protectionsStr = protections.length > 0
      ? ', protects ' + joinList(protections)
      : '';

  let actionStr;
  if (actions.length === 0) {
    actionStr = ', and only tracks them (no actions configured).';
  } else {
    // Figure out if any post-grace action exists to decide wording.
    // Keep in sync with DEFAULT_IMMEDIATE_TYPES and LOCKED_AFTER_GRACE_TYPES
    // in renderPipeline(). downgrade_quality is locked after_grace, so
    // it always counts toward hasPostGrace regardless of step.timing.
    const IMMEDIATE = new Set(['sync_collection', 'add_arr_tag', 'remove_arr_tag']);
    const LOCKED_AFTER_GRACE = new Set([
      'downgrade_quality', 'swap_quality_profile',
      'set_root_folder', 'migrate_to_instance',
    ]);
    const hasPostGrace = pipelineSteps.some(s => {
      if (LOCKED_AFTER_GRACE.has(s.type)) return true;
      const timing = s.timing || (IMMEDIATE.has(s.type) ? 'immediate' : 'after_grace');
      return timing === 'after_grace';
    });
    const allImmediate = !hasPostGrace;
    const suffix = allImmediate ? ' on every scan' : ' after ' + graceDays + ' days';
    actionStr = ', and then ' + joinList(actions) + suffix + '.';
  }

  target.className = 'text-sm';
  target.innerHTML =
    '<span class="text-zinc-500 text-xs uppercase tracking-wide font-semibold mr-2">Summary</span>' +
    '<span class="text-zinc-300">This rule ' + criteriaStr + protectionsStr + actionStr + scheduleStr + '</span>';
}

function capitaliseFirst(s) {
  if (!s) return '';
  return s[0].toUpperCase() + s.slice(1);
}

/* Hook live-update of the summary to any input/change event in settings-body.
   Also fires after pipeline edits. */
function wireLiveSummary() {
  const body = document.getElementById('settings-body');
  if (!body) return;
  const handler = () => updateSummaryCard();
  body.addEventListener('input', handler);
  body.addEventListener('change', handler);
  body.addEventListener('click', (e) => {
    // Toggle switches are labels/spans that flip a hidden checkbox; the input
    // fires 'change' so we're covered. Pipeline add/remove/reorder buttons
    // re-render, so we also re-hook after each renderPipeline() call.
    if (e.target.closest('#pipeline-steps') || e.target.closest('button')) {
      setTimeout(handler, 30);
    }
  });
}

/* --- Interaction handlers --- */

function toggleCard(id) {
  const cb = document.getElementById(`${id}-enabled`);
  const card = document.getElementById(`card-${id}`);
  const opts = document.getElementById(`${id}-options`);
  const sw = card ? card.querySelector('.tw-switch') : null;
  if (!cb || !card) return;
  if (cb.checked) {
    card.classList.remove('opacity-50');
    if (opts) { opts.classList.remove('invisible', 'opacity-0'); }
    if (sw) sw.classList.add('active');
  } else {
    card.classList.add('opacity-50');
    if (opts) { opts.classList.add('invisible', 'opacity-0'); }
    if (sw) sw.classList.remove('active');
  }
  // Separate option panels (shown only when the toggle is on).
  const EXTRA_OPTION_CARDS = [
    'highly-rated', 'low-rating', 'watch-ratio-low', 'release-year-before',
    'file-size-min', 'old-season'
  ];
  if (EXTRA_OPTION_CARDS.includes(id)) {
    const opts = document.getElementById(`${id}-options`);
    if (opts) {
      if (cb.checked) opts.classList.remove('hidden');
      else opts.classList.add('hidden');
    }
  }
}

function handleLibraryChange() {
  const sel = document.getElementById('cfg-library');
  const opt = sel.options[sel.selectedIndex];
  const libType = opt ? opt.getAttribute('data-type') : 'movie';
  const badge = document.getElementById('lib-type-badge');
  if (badge) badge.textContent = libType === 'show' ? 'TV Show' : 'Movie';
  const granSection = document.getElementById('granularity-section');
  if (granSection) {
    if (libType === 'show') granSection.classList.remove('hidden');
    else granSection.classList.add('hidden');
  }
  // TV-only rule cards (show-ended sits inline in the Common section now,
  // so gate it directly rather than via a shared TV wrapper).
  const showEndedWrap = document.getElementById('criteria-show-ended-wrapper');
  if (showEndedWrap) {
    if (libType === 'show') showEndedWrap.classList.remove('hidden');
    else showEndedWrap.classList.add('hidden');
  }
  applyGranularityVisibility();
  // Pipeline step labels say "Radarr" / "Sonarr" based on the rule's
  // library type, so re-render on library change. renderPipeline() itself
  // calls refreshPipelineWarnings + updateSaveGate, so no double work.
  if (typeof renderPipeline === 'function') renderPipeline();
  else if (typeof refreshPipelineWarnings === 'function') refreshPipelineWarnings();
  if (typeof updateSaveGate === 'function') updateSaveGate();
  if (typeof updateSummaryCard === 'function') updateSummaryCard();
}

/* Show/hide elements that depend on granularity being "season". */
function applyGranularityVisibility() {
  const sel = document.getElementById('cfg-library');
  const opt = sel ? sel.options[sel.selectedIndex] : null;
  const libType = opt ? opt.getAttribute('data-type') : 'movie';
  const granularity = document.querySelector('input[name="granularity"]:checked')?.value || 'show';
  const isSeason = libType === 'show' && granularity === 'season';

  const oldSeasonWrap = document.getElementById('old-season-wrapper');
  if (oldSeasonWrap) {
    if (isSeason) oldSeasonWrap.classList.remove('hidden');
    else oldSeasonWrap.classList.add('hidden');
  }
  const protectTv = document.getElementById('protect-tv-section');
  if (protectTv) {
    if (isSeason) protectTv.classList.remove('hidden');
    else protectTv.classList.add('hidden');
  }
  // Granularity changes can invalidate/re-validate downgrade_quality steps.
  if (typeof refreshPipelineWarnings === 'function') refreshPipelineWarnings();
  if (typeof updateSaveGate === 'function') updateSaveGate();
}

let pipelineSteps = [];

/* ------------------------------------------------------------------
   Action presets.

   Each preset rewrites pipelineSteps with a canonical shape. A preset
   counts as "active" when the live pipeline's step-type sequence
   exactly matches. Anything else shows as Custom, so adding/removing
   steps flips the highlighted preset automatically.
------------------------------------------------------------------ */
const ACTION_PRESETS = {
  notify: {
    types: ['notify'],
    build: () => [{ type: 'notify', command: '', timing: 'after_grace' }],
  },
  soft_delete: {
    types: ['sync_collection', 'add_arr_tag', 'delete_files', 'import_exclusion'],
    build: () => [
      { type: 'sync_collection', command: 'Leaving soon', timing: 'immediate' },
      { type: 'add_arr_tag', command: 'leaving-soon', timing: 'immediate' },
      { type: 'delete_files', command: '', timing: 'after_grace' },
      { type: 'import_exclusion', command: '', timing: 'after_grace' },
    ],
  },
  unmonitor: {
    types: ['unmonitor'],
    build: () => [{ type: 'unmonitor', command: '', timing: 'after_grace' }],
  },
};

function detectActionPreset() {
  const seq = pipelineSteps.map(s => s.type).join(',');
  for (const [k, p] of Object.entries(ACTION_PRESETS)) {
    if (p.types.join(',') === seq) return k;
  }
  return 'custom';
}

function updateActionPresetSelection() {
  const active = detectActionPreset();
  const btns = document.querySelectorAll('[data-action-preset]');
  btns.forEach(btn => {
    const key = btn.getAttribute('data-action-preset');
    const on = key === active;
    btn.classList.toggle('border-indigo-500', on);
    btn.classList.toggle('bg-indigo-500/10', on);
    btn.classList.toggle('border-zinc-700', !on);
  });
}

function applyActionPreset(presetKey) {
  // Custom is informational - don't clobber the user's current edits.
  const preset = ACTION_PRESETS[presetKey];
  if (preset) {
    pipelineSteps = preset.build();
    renderPipeline();
  }
  updateActionPresetSelection();
}

function renderPipeline() {
  const container = document.getElementById('pipeline-steps');
  if (!container) return;
  if (pipelineSteps.length === 0) {
    container.innerHTML = '<p class="text-zinc-500 text-sm">No actions configured. Items will be staged but nothing will happen when the grace period expires.</p>';
    return;
  }
  // Default timing per action type. Users can override per-step via the badge.
  const DEFAULT_IMMEDIATE_TYPES = new Set(['sync_collection', 'add_arr_tag', 'remove_arr_tag']);
  // Step types whose timing is locked and can't be flipped by the user.
  // downgrade/swap_quality_profile, set_root_folder, migrate_to_instance
  // only make sense after grace -- running them every scan would thrash
  // the arr or create dupes.
  const LOCKED_AFTER_GRACE_TYPES = new Set([
    'downgrade_quality', 'swap_quality_profile',
    'set_root_folder', 'migrate_to_instance',
  ]);
  // Step types that act on an arr (need an instance picker). Determines
  // whether the per-step instance dropdown is shown.
  const ARR_TOUCHING_TYPES = new Set([
    'unmonitor', 'delete', 'delete_files', 'import_exclusion',
    'add_arr_tag', 'remove_arr_tag', 'set_root_folder', 'trigger_search',
    'downgrade_quality', 'swap_quality_profile', 'migrate_to_instance',
  ]);
  // Rule-specific arr terminology: the library dropdown carries data-type
  // ("movie" | "show"), which maps to Radarr or Sonarr. Falls back to the
  // generic "Radarr/Sonarr" wording only if the library isn't chosen yet.
  const _libEl = document.getElementById('cfg-library');
  const _libType = _libEl ? _libEl.options[_libEl.selectedIndex]?.getAttribute('data-type') : null;
  const arrName = _libType === 'movie' ? 'Radarr' : _libType === 'show' ? 'Sonarr' : 'Radarr/Sonarr';
  const arrKind = _libType === 'movie' ? 'radarr' : _libType === 'show' ? 'sonarr' : null;
  const instances = window._instances || [];
  const kindInstances = (k) => instances.filter(i => i.kind === k);

  function instanceOptionsHtml(selectedId, kind) {
    const list = kind ? kindInstances(kind) : instances;
    const def = list.find(i => i.is_default);
    const selVal = (selectedId == null || selectedId === '') ? '' : String(selectedId);
    const opts = [`<option value="" ${selVal === '' ? 'selected' : ''}>${def ? `Default (${def.name})` : 'Default'}</option>`];
    list.forEach(i => {
      opts.push(`<option value="${i.id}" ${selVal === String(i.id) ? 'selected' : ''}>${i.name}${i.is_default ? ' \u2605' : ''}</option>`);
    });
    return opts.join('');
  }

  container.innerHTML = pipelineSteps.map((step, i) => {
    const typeOpts = [
      ['unmonitor',            `Unmonitor in ${arrName}`],
      ['delete',               `Delete from ${arrName}`],
      ['delete_files',         `Delete files from disk`],
      ['import_exclusion',     `Block from re-importing`],
      ['sync_collection',      `Sync to Plex/Jellyfin collection`],
      ['add_arr_tag',          `Tag in ${arrName}`],
      ['remove_arr_tag',       `Remove tag in ${arrName}`],
      ['set_root_folder',      `Move to root folder`],
      ['swap_quality_profile', `Swap quality profile`],
      ['trigger_search',       `Trigger search`],
      ['migrate_to_instance',  `Migrate to another ${arrName}`],
      ['notify',               `Send notification`],
      ['script',               `Run custom script`],
    ].map(([v, l]) => `<option value="${v}" ${step.type === v ? 'selected' : ''}>${l}</option>`).join('');
    const showCmd = step.type === 'script';
    const showCollection = step.type === 'sync_collection';
    const showTag = step.type === 'add_arr_tag' || step.type === 'remove_arr_tag';
    const showQualityChip = step.type === 'downgrade_quality' || step.type === 'swap_quality_profile';
    const showNotifyTemplate = step.type === 'notify';
    const showRootFolder = step.type === 'set_root_folder';
    const showMigrate = step.type === 'migrate_to_instance';
    const showParam = showCollection || showTag || showQualityChip;
    const showInstancePicker = ARR_TOUCHING_TYPES.has(step.type) && instances.length > 0;
    // Effective timing: explicit user choice wins; otherwise default from
    // type. Locked types always use after_grace and ignore step.timing.
    let timing;
    if (LOCKED_AFTER_GRACE_TYPES.has(step.type)) {
      timing = 'after_grace';
    } else {
      timing = step.timing || (DEFAULT_IMMEDIATE_TYPES.has(step.type) ? 'immediate' : 'after_grace');
    }
    const isImmediate = timing === 'immediate';
    const isLocked = LOCKED_AFTER_GRACE_TYPES.has(step.type);
    let timingBadge;
    if (isLocked) {
      // Rendered as a disabled button so the layout matches non-locked
      // steps. tabindex=-1 + aria-disabled keeps it out of keyboard nav
      // but we also opacity-50 + cursor-not-allowed visually.
      timingBadge = `<button type="button" disabled aria-disabled="true" tabindex="-1"
          title="This action type can only run after the grace period"
          class="inline-flex px-1.5 py-0.5 rounded text-xs font-semibold bg-amber-500/15 text-amber-400 whitespace-nowrap opacity-60 cursor-not-allowed">After grace</button>`;
    } else if (isImmediate) {
      timingBadge = `<button type="button" title="Click to run only after grace period" onclick="togglePipelineTiming(${i})"
            class="inline-flex px-1.5 py-0.5 rounded text-xs font-semibold bg-sky-500/15 text-sky-400 hover:bg-sky-500/25 whitespace-nowrap cursor-pointer transition-colors">Immediate</button>`;
    } else {
      timingBadge = `<button type="button" title="Click to run on every scan" onclick="togglePipelineTiming(${i})"
            class="inline-flex px-1.5 py-0.5 rounded text-xs font-semibold bg-amber-500/15 text-amber-400 hover:bg-amber-500/25 whitespace-nowrap cursor-pointer transition-colors">After grace</button>`;
    }
    // Per-step warning slot (e.g. downgrade_quality + season granularity).
    const stepWarningHtml = `<div id="pipeline-warning-${i}" class="hidden mt-2 text-xs text-amber-400"></div>`;
    const extraRows = [
      showCmd, showNotifyTemplate, showParam,
      showRootFolder, showMigrate, showInstancePicker,
    ].some(Boolean);
    // Instance picker (single arr). Hidden for migrate_to_instance --
    // that step renders its own source+target dropdowns.
    const instancePickerHtml = (showInstancePicker && !showMigrate) ? `
      <div class="mb-2">
        <label class="block text-xs text-zinc-400 mb-1">Instance</label>
        <select onchange="updatePipelineStep(${i}, 'instance_id', this.value)"
                class="w-full bg-zinc-900 border border-zinc-700 rounded-md px-3 py-2 text-sm text-zinc-100 focus:border-indigo-500 focus:outline-none">${instanceOptionsHtml(step.instance_id, arrKind)}</select>
      </div>` : '';
    // Root-folder path input for set_root_folder.
    const rootFolderHtml = showRootFolder ? `
      <input type="text" placeholder="/mnt/cloud-storage/Movies" value="${(step.command || '').replace(/"/g, '&quot;')}" onchange="updatePipelineStep(${i}, 'command', this.value)" class="w-full bg-zinc-900 border border-zinc-700 rounded-md px-3 py-2 text-sm text-zinc-100 focus:border-indigo-500 focus:outline-none">
      <p class="text-zinc-500 text-[0.7rem] mt-1">Path on the target arr. Radarr/Sonarr will move the files.</p>` : '';
    // Migrate-to-instance block: source picker + target picker + root + profile + keep_source.
    const migrateHtml = showMigrate ? `
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-2">
        <div>
          <label class="block text-xs text-zinc-400 mb-1">Source (from)</label>
          <select onchange="updatePipelineStep(${i}, 'instance_id', this.value)"
                  class="w-full bg-zinc-900 border border-zinc-700 rounded-md px-3 py-2 text-sm text-zinc-100 focus:border-indigo-500 focus:outline-none">${instanceOptionsHtml(step.instance_id, arrKind)}</select>
        </div>
        <div>
          <label class="block text-xs text-zinc-400 mb-1">Target (to)</label>
          <select onchange="updatePipelineStep(${i}, 'target_instance_id', this.value)"
                  class="w-full bg-zinc-900 border border-zinc-700 rounded-md px-3 py-2 text-sm text-zinc-100 focus:border-indigo-500 focus:outline-none">${instanceOptionsHtml(step.target_instance_id, arrKind)}</select>
        </div>
      </div>
      <input type="text" placeholder="Target root folder (e.g. /mnt/cloud-storage/Movies)" value="${(step.target_root_folder || '').replace(/"/g, '&quot;')}" onchange="updatePipelineStep(${i}, 'target_root_folder', this.value)"
             class="w-full bg-zinc-900 border border-zinc-700 rounded-md px-3 py-2 text-sm text-zinc-100 focus:border-indigo-500 focus:outline-none mb-2">
      <input type="text" placeholder="Target quality profile name (blank = match source)" value="${(step.target_profile || '').replace(/"/g, '&quot;')}" onchange="updatePipelineStep(${i}, 'target_profile', this.value)"
             class="w-full bg-zinc-900 border border-zinc-700 rounded-md px-3 py-2 text-sm text-zinc-100 focus:border-indigo-500 focus:outline-none mb-2">
      <label class="flex items-center gap-2 text-xs text-zinc-300">
        <input type="checkbox" ${step.keep_source === false ? '' : 'checked'} onchange="updatePipelineStep(${i}, 'keep_source', this.checked)"
               class="rounded border-zinc-700 bg-zinc-800 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-zinc-900">
        Keep on source (otherwise remove source entry without deleting files)
      </label>` : '';
    return `<div class="flex gap-2 items-start mb-2 p-3 bg-zinc-900 border border-zinc-800 rounded-lg">
      <span class="text-zinc-500 text-xs pt-2 min-w-[1.5rem]">${i + 1}.</span>
      <div class="flex-1">
        <div class="flex gap-2 items-center ${extraRows ? 'mb-2' : ''}">
          <select onchange="updatePipelineStep(${i}, 'type', this.value)"
                  class="flex-1 bg-zinc-900 border border-zinc-700 rounded-md px-3 py-2 text-sm text-zinc-100 focus:border-indigo-500 focus:outline-none">${typeOpts}</select>
          ${timingBadge}
        </div>
        ${stepWarningHtml}
        ${instancePickerHtml}
        ${showCmd ? `<input type="text" placeholder="/path/to/script.sh" value="${step.command || ''}" onchange="updatePipelineStep(${i}, 'command', this.value)" class="w-full bg-zinc-900 border border-zinc-700 rounded-md px-3 py-2 text-sm text-zinc-100 focus:border-indigo-500 focus:outline-none">` : ''}
        ${showNotifyTemplate ? `
          <label class="block text-xs text-zinc-400 mb-1">Message template</label>
          <textarea rows="3"
                    placeholder="Substitutions available: {title}, {show}, {season}, {episode}, {collection}, {size}, {grace_expires}, {action_summary}"
                    onchange="updatePipelineStep(${i}, 'command', this.value)"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-md px-3 py-2 text-sm text-zinc-100 focus:border-indigo-500 focus:outline-none font-mono">${step.command || ''}</textarea>
          <p class="text-zinc-500 text-[0.7rem] mt-1">Leave blank for the default template.</p>
        ` : ''}
        ${showParam ? `<div id="pipeline-chip-${i}"></div>` : ''}
        ${rootFolderHtml}
        ${migrateHtml}
      </div>
      <div class="flex flex-col gap-1 pt-1">
        ${i > 0 ? `<button type="button" class="px-1.5 py-0.5 text-xs rounded border border-zinc-700 text-zinc-400 hover:bg-zinc-800 transition-colors" onclick="movePipelineStep(${i},-1)">&#9650;</button>` : ''}
        ${i < pipelineSteps.length - 1 ? `<button type="button" class="px-1.5 py-0.5 text-xs rounded border border-zinc-700 text-zinc-400 hover:bg-zinc-800 transition-colors" onclick="movePipelineStep(${i},1)">&#9660;</button>` : ''}
      </div>
      <button type="button" class="text-rose-500 hover:text-rose-400 text-lg leading-none p-1 transition-colors" onclick="removePipelineStep(${i})">&times;</button>
    </div>`;
  }).join('');

  // Initialize chip inputs for collection/tag/quality-profile pipeline
  // steps. downgrade_quality is single-value by convention (the chip
  // UI still allows multiple entries, but the backend reads the first).
  pipelineSteps.forEach((step, i) => {
    const chipTypes = new Set([
      'sync_collection', 'add_arr_tag', 'remove_arr_tag',
      'downgrade_quality', 'swap_quality_profile',
    ]);
    if (!chipTypes.has(step.type)) return;
    const containerId = 'pipeline-chip-' + i;
    const el = document.getElementById(containerId);
    if (!el) return;
    const isCollection = step.type === 'sync_collection';
    const isQuality = step.type === 'downgrade_quality' || step.type === 'swap_quality_profile';
    const initialValues = (step.command || '').split(',').map(s => s.trim()).filter(Boolean);
    let suggestions = [];
    let placeholder = 'Type a tag and press Enter...';
    if (isCollection) {
      suggestions = allPlexCollections;
      placeholder = 'Type a collection name...';
    } else if (isQuality) {
      // Quality profile names aren't sourced from anywhere client-side
      // yet - freeform text is the only option. Placeholder hints at
      // the common naming.
      suggestions = [];
      placeholder = 'e.g. 720p';
    } else {
      suggestions = window._arrTags || [];
    }
    createChipInput({
      containerId: containerId,
      initialValues: initialValues,
      suggestions: suggestions,
      allowFreeform: true,
      placeholder: placeholder,
      onChange: (vals) => {
        // downgrade_quality / swap_quality_profile are single-value
        // semantically; keep only the first entry if the user tries to
        // add multiple. The backend expects a single profile name as
        // `command`. Same logic applies to add_arr_tag/remove_arr_tag
        // which operate on one tag per step.
        const singleValue = isQuality || step.type === 'add_arr_tag' || step.type === 'remove_arr_tag';
        if (singleValue && vals.length > 1) {
          const first = vals[0];
          chipInputs[containerId]?.setValues([first]);
          pipelineSteps[i].command = first;
        } else {
          pipelineSteps[i].command = vals.join(',');
        }
        refreshPipelineWarnings();
        updateSaveGate();
        updateSummaryCard();
      },
    });
  });

  // Recompute per-step warnings + global save gate.
  refreshPipelineWarnings();
  updateSaveGate();

  // Keep the preset row in sync with the live pipeline.
  if (typeof updateActionPresetSelection === 'function') updateActionPresetSelection();

  // Reflect pipeline edits in the live summary.
  if (typeof updateSummaryCard === 'function') updateSummaryCard();
}

/* ------------------------------------------------------------------
   Pipeline step warnings + save gate.

   Some action types are incompatible with certain rule settings (for
   example downgrade_quality doesn't make sense for season-granularity
   rules because quality profiles are per-series in Sonarr, not per
   season). We surface these inline under the relevant step and
   disable Save while the combination is invalid.
------------------------------------------------------------------ */
function refreshPipelineWarnings() {
  const granularity = document.querySelector('input[name="granularity"]:checked')?.value || 'show';
  const libEl = document.getElementById('cfg-library');
  const libOpt = libEl ? libEl.options[libEl.selectedIndex] : null;
  const libType = libOpt ? libOpt.getAttribute('data-type') : 'movie';
  const isSeason = libType === 'show' && granularity === 'season';
  // Which arr applies to this rule. Unknown (no library selected) is
  // treated as "both", so we check either side; the warning still fires
  // only if at least one of them has no bin.
  const arrKey = libType === 'show' ? 'sonarr' : libType === 'movie' ? 'radarr' : null;
  const arrName = arrKey === 'sonarr' ? 'Sonarr' : arrKey === 'radarr' ? 'Radarr' : 'the arr';
  const recycle = (window._recycleBinStatus || {})[arrKey] || null;
  // Only fire the bin warning when we know the arr is connected (reason
  // is null or not 'not_connected'). If the arr isn't connected at all,
  // the step is going to fail for reasons other than recycle-bin anyway.
  const binMissing = arrKey && recycle && recycle.reason !== 'not_connected' && !recycle.configured;
  pipelineSteps.forEach((step, i) => {
    const warnEl = document.getElementById('pipeline-warning-' + i);
    if (!warnEl) return;
    const msgs = [];
    if ((step.type === 'downgrade_quality' || step.type === 'swap_quality_profile') && isSeason) {
      msgs.push('Swap quality profile is not supported for season-granularity rules.');
    }
    if ((step.type === 'set_root_folder' || step.type === 'migrate_to_instance') && isSeason) {
      msgs.push(`${step.type === 'set_root_folder' ? 'Moving root folder' : 'Migrating to another instance'} is not supported for season-granularity rules.`);
    }
    if (step.type === 'migrate_to_instance') {
      if (!step.target_instance_id) msgs.push('Select a target instance.');
      if (!(step.target_root_folder || '').trim()) msgs.push('Set a target root folder.');
    }
    if (step.type === 'set_root_folder' && !(step.command || '').trim()) {
      msgs.push('Enter a root folder path.');
    }
    if ((step.type === 'delete' || step.type === 'delete_files') && binMissing) {
      msgs.push(
        `${arrName} has no recycle bin configured, so this step will permanently delete files. ` +
        `Set a Recycle Bin Path under ${arrName} \u2192 Settings \u2192 Media Management \u2192 File Management to enable soft-delete.`
      );
    }
    if (msgs.length) {
      warnEl.innerHTML = msgs.map(m =>
        `<div class="flex items-start gap-1.5"><span aria-hidden="true">\u26A0</span><span>${m}</span></div>`
      ).join('');
      warnEl.classList.remove('hidden');
    } else {
      warnEl.textContent = '';
      warnEl.classList.add('hidden');
    }
  });
}

function pipelineHasBlockingIssue() {
  const granularity = document.querySelector('input[name="granularity"]:checked')?.value || 'show';
  const libEl = document.getElementById('cfg-library');
  const libOpt = libEl ? libEl.options[libEl.selectedIndex] : null;
  const libType = libOpt ? libOpt.getAttribute('data-type') : 'movie';
  const isSeason = libType === 'show' && granularity === 'season';
  return pipelineSteps.some(s => {
    if (isSeason && (s.type === 'downgrade_quality' || s.type === 'swap_quality_profile'
                     || s.type === 'set_root_folder' || s.type === 'migrate_to_instance')) return true;
    if (s.type === 'set_root_folder' && !(s.command || '').trim()) return true;
    if (s.type === 'migrate_to_instance' &&
        (!s.target_instance_id || !(s.target_root_folder || '').trim())) return true;
    return false;
  });
}

function updateSaveGate() {
  const btn = document.getElementById('cfg-save');
  if (!btn) return;
  const blocked = pipelineHasBlockingIssue();
  btn.disabled = blocked;
  btn.classList.toggle('opacity-50', blocked);
  btn.classList.toggle('cursor-not-allowed', blocked);
  btn.title = blocked
    ? 'Fix the incompatible action type before saving (see warnings above).'
    : '';
}

function addPipelineStep() {
  pipelineSteps.push({ type: 'unmonitor', command: '' });
  renderPipeline();
}

/* ------------------------------------------------------------------
   Pipeline templates. Each template appends a skeleton set of steps
   to the existing pipeline (instead of replacing) so users can stack
   them. Placeholders like empty commands / missing instance ids are
   intentional -- the user has to fill them in, and the save gate
   warns on anything blank.
------------------------------------------------------------------ */
const PIPELINE_TEMPLATES = {
  // "Offload local copy": pragmatic pattern for stacks where a
  // tag-gated download client produces symlinks into a remote-backed
  // mount (e.g. decypharr + rclone). Tag FIRST so future arr grabs
  // route through that client, then delete_files removes local copies
  // and trigger_search repopulates the same root folder with symlinks.
  // Tags are series-level in Sonarr, so this affects every future grab
  // for the series -- set indexer priorities accordingly if you want
  // the latest season to still grab locally.
  offload_local_copy: [
    { type: 'add_arr_tag', command: '' },
    { type: 'delete_files', command: '' },
    { type: 'trigger_search', command: '' },
  ],
  migrate_to_cloud: [
    { type: 'swap_quality_profile', command: '' },
    { type: 'set_root_folder', command: '' },
    { type: 'trigger_search', command: '' },
    { type: 'remove_arr_tag', command: 'migrate-to-cloud' },
    { type: 'add_arr_tag', command: 'on-cloud' },
  ],
  migrate_to_local: [
    { type: 'swap_quality_profile', command: '' },
    { type: 'set_root_folder', command: '' },
    { type: 'trigger_search', command: '' },
    { type: 'remove_arr_tag', command: 'migrate-to-local' },
    { type: 'add_arr_tag', command: 'on-local' },
  ],
  promote_to_4k: [
    { type: 'migrate_to_instance', command: '', target_instance_id: '',
      target_root_folder: '', target_profile: '', keep_source: true },
    { type: 'add_arr_tag', command: 'promoted-to-4k' },
  ],
  retag_after_migration: [
    { type: 'remove_arr_tag', command: '' },
    { type: 'add_arr_tag', command: '' },
  ],
};

function applyPipelineTemplate(key) {
  const tpl = PIPELINE_TEMPLATES[key];
  if (!tpl) return;
  tpl.forEach(step => pipelineSteps.push({ ...step }));
  renderPipeline();
  if (typeof showToast === 'function') {
    showToast(`Inserted ${tpl.length} template steps. Fill in the placeholders and hit Save.`, 'info');
  }
}

function removePipelineStep(i) {
  pipelineSteps.splice(i, 1);
  renderPipeline();
}

function updatePipelineStep(i, field, value) {
  pipelineSteps[i][field] = value;
  // Changing type resets an explicit timing override; the new default kicks in.
  if (field === 'type') {
    delete pipelineSteps[i].timing;
    renderPipeline();
  }
}

function togglePipelineTiming(i) {
  const step = pipelineSteps[i];
  const defaultImmediate = new Set(['sync_collection', 'add_arr_tag', 'remove_arr_tag']).has(step.type);
  const currentImmediate = (step.timing || (defaultImmediate ? 'immediate' : 'after_grace')) === 'immediate';
  step.timing = currentImmediate ? 'after_grace' : 'immediate';
  renderPipeline();
}

function movePipelineStep(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= pipelineSteps.length) return;
  [pipelineSteps[i], pipelineSteps[j]] = [pipelineSteps[j], pipelineSteps[i]];
  renderPipeline();
}

function handleActionChange() {
  // legacy
}
