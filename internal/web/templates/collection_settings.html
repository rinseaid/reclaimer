function gatherCriteria() {
  const tagValues = chipInputs['protect-tags'] ? chipInputs['protect-tags'].getValues() : [];
  const collectionValues = chipInputs['protect-collections'] ? chipInputs['protect-collections'].getValues() : [];
  const userValues = chipInputs['protect-users'] ? chipInputs['protect-users'].getValues() : [];

  // request_fulfilled and available_on_debrid have no UI card; round-trip
  // whatever the backend returned on load so they're not silently cleared.
  let loadedRules = {};
  try {
    if (collectionConfig && collectionConfig.criteria) {
      const c = typeof collectionConfig.criteria === 'string'
        ? JSON.parse(collectionConfig.criteria)
        : collectionConfig.criteria;
      loadedRules = (c && c.rules) || {};
    }
  } catch (_) {}
  const reqFulfilled = !!(loadedRules.request_fulfilled && loadedRules.request_fulfilled.enabled);
  const debridEnabled = !!(loadedRules.available_on_debrid && loadedRules.available_on_debrid.enabled);

  return {
    rules: {
      // Criteria
      never_watched: {
        enabled: false,
        check_plex_views: true,
        check_db_plays: true,
        min_days_unwatched: 0,
        exclude_users: [],
      },
      not_watched_recently: {
        enabled: document.getElementById('not-watched-recently-enabled')?.checked ?? false,
        days: parseInt(document.getElementById('not-watched-recently-days')?.value || '90', 10),
      },
      show_ended: {
        enabled: document.getElementById('show-ended-enabled')?.checked ?? false,
        include_deleted: true,
      },
      low_rating: {
        enabled: document.getElementById('low-rating-enabled')?.checked ?? false,
        imdb_max: parseFloat(document.getElementById('low-rating-imdb-max')?.value || '0') || 0,
        critic_max: parseInt(document.getElementById('low-rating-critic-max')?.value || '0', 10) || 0,
        require_all: document.getElementById('low-rating-require-all')?.checked ?? false,
      },
      file_size_min: {
        enabled: document.getElementById('file-size-min-enabled')?.checked ?? false,
        min_gb: parseFloat(document.getElementById('file-size-min-gb')?.value || '0') || 0,
      },
      release_year_before: {
        enabled: document.getElementById('release-year-before-enabled')?.checked ?? false,
        year: parseInt(document.getElementById('release-year-before-year')?.value || '0', 10) || 0,
      },
      watch_ratio_low: {
        enabled: document.getElementById('watch-ratio-low-enabled')?.checked ?? false,
        max_percent: parseInt(document.getElementById('watch-ratio-low-max-percent')?.value || '30', 10),
        require_plays: document.getElementById('watch-ratio-low-require-plays')?.checked ?? true,
      },
      old_season: {
        enabled: document.getElementById('old-season-enabled')?.checked ?? false,
        keep_last: parseInt(document.getElementById('old-season-keep-last')?.value || '2', 10),
      },
      old_content: {
        enabled: document.getElementById('old-content-enabled')?.checked ?? false,
        days: parseInt(document.getElementById('old-content-days')?.value || '180', 10),
      },
      request_fulfilled: { enabled: reqFulfilled },
      available_on_debrid: { enabled: debridEnabled },
      // Protections
      no_keep_tag: { enabled: tagValues.length > 0, protected_tags: tagValues },
      no_active_request: { enabled: document.getElementById('active-request-enabled')?.checked ?? false },
      no_protected_request: { enabled: userValues.length > 0 },
      not_in_keep_collection: {
        enabled: collectionValues.length > 0,
        protected_collections: collectionValues,
      },
      highly_rated: {
        enabled: document.getElementById('highly-rated-enabled')?.checked ?? false,
        imdb_min: parseFloat(document.getElementById('highly-rated-imdb-min')?.value || '0') || 0,
        rt_min: parseInt(document.getElementById('highly-rated-rt-min')?.value || '0', 10) || 0,
        metacritic_min: parseInt(document.getElementById('highly-rated-mc-min')?.value || '0', 10) || 0,
        require_all: document.getElementById('highly-rated-require-all')?.checked ?? false,
      },
      recently_added: {
        enabled: document.getElementById('recently-added-enabled')?.checked ?? false,
        days: parseInt(document.getElementById('recently-added-days')?.value || '14', 10),
      },
      partially_watched: {
        enabled: document.getElementById('partially-watched-enabled')?.checked ?? false,
        days: parseInt(document.getElementById('partially-watched-days')?.value || '30', 10),
      },
      on_watchlist: { enabled: document.getElementById('on-watchlist-enabled')?.checked ?? false },
      plex_favorited: { enabled: document.getElementById('plex-favorited-enabled')?.checked ?? false },
      series_protection: { enabled: document.getElementById('series-protection-enabled')?.checked ?? false },
    },
    action: 'none',
    grace_days: parseInt(document.getElementById('cfg-grace-days')?.value || '30', 10),
    delete_files: false,
    add_import_exclusion: false,
    // Preserve every field on a step -- instance_id, timing, plus
    // migrate-specific target_* extras. The backend ignores unknown
    // fields, so passing the full object is safe and future-proof.
    action_pipeline: pipelineSteps.map(s => {
      const out = { type: s.type, command: s.command || '' };
      if (s.timing) out.timing = s.timing;
      if (s.instance_id != null && s.instance_id !== '') out.instance_id = Number(s.instance_id);
      if (s.target_instance_id != null && s.target_instance_id !== '') out.target_instance_id = Number(s.target_instance_id);
      if (s.target_root_folder) out.target_root_folder = s.target_root_folder;
      if (s.target_profile) out.target_profile = s.target_profile;
      if (s.keep_source != null) out.keep_source = !!s.keep_source;
      return out;
    }),
    protected_users: userValues,
    protected_tags: tagValues,
    protected_collections: collectionValues,
    library_section_id: (() => {
      const val = document.getElementById('cfg-library')?.value;
      const parsed = parseInt(val);
      return isNaN(parsed) ? val : parsed;
    })(),
    library_source: (() => {
      const libEl = document.getElementById('cfg-library');
      const libOpt = libEl?.options[libEl.selectedIndex];
      return libOpt?.getAttribute('data-source') || 'plex';
    })(),
    granularity: document.querySelector('input[name="granularity"]:checked')?.value || 'show',
  };
}

const DESTRUCTIVE_STEPS = new Set(['delete', 'delete_files', 'import_exclusion']);
const STEP_DESCRIPTIONS = {
  unmonitor: 'unmonitor the item in Radarr/Sonarr',
  delete: 'delete the item from Plex/Radarr/Sonarr',
  delete_files: 'delete files from disk',
  import_exclusion: 'block re-importing',
  sync_collection: 'sync to a Plex/Jellyfin collection',
  add_arr_tag: 'add a tag in Radarr/Sonarr',
  remove_arr_tag: 'remove a tag in Radarr/Sonarr',
  set_root_folder: 'move to a different root folder',
  swap_quality_profile: 'swap quality profile',
  trigger_search: 'trigger an arr search',
  migrate_to_instance: 'migrate to another Radarr/Sonarr instance',
  notify: 'send a notification',
  downgrade_quality: 'downgrade the quality profile',
  script: 'run a custom script',
};

function buildPipelineSummary(steps) {
  if (!steps || steps.length === 0) return 'No actions configured.';
  const parts = steps.map(s => STEP_DESCRIPTIONS[s.type] || s.type);
  return 'This rule will: ' + parts.join(' \u2192 ') + '.';
}

function pipelineHasDestructive(steps) {
  return (steps || []).some(s => DESTRUCTIVE_STEPS.has(s.type));
}

/* Field name mapping for inline validation errors. The FastAPI
   validation error handler in saveConfig() looks up the offending field
   by its pydantic key and jumps to the matching input. Keys here are
   either the top-level body key or a nested last-segment from loc[].
   When adding a new field in gatherCriteria() / buildSaveBody(), add a
   matching entry here so backend validation errors highlight it. */
const FIELD_MAP = {
  name: { id: 'cfg-name', tab: 'criteria' },
  cfg_name: { id: 'cfg-name', tab: 'criteria' },
  grace_days: { id: 'cfg-grace-days', tab: 'action' },
  library_section_id: { id: 'cfg-library', tab: 'criteria' },
  library_source: { id: 'cfg-library', tab: 'criteria' },
  action_pipeline: { id: 'pipeline-steps', tab: 'action' },
  not_watched_recently_days: { id: 'not-watched-recently-days', tab: 'criteria' },
  old_content_days: { id: 'old-content-days', tab: 'criteria' },
  // Per-rule schedule + priority. These live in the Advanced section,
  // which is above the tab nav and therefore not tab-scoped - the
  // "criteria" tab is the default view so jumping there on error keeps
  // the Advanced section visible (it's above the tabs).
  schedule_cron: { id: 'cfg-schedule-cron', tab: 'criteria' },
  priority: { id: 'cfg-priority', tab: 'criteria' },
  // New rules
  imdb_max: { id: 'low-rating-imdb-max', tab: 'criteria' },
  critic_max: { id: 'low-rating-critic-max', tab: 'criteria' },
  min_gb: { id: 'file-size-min-gb', tab: 'criteria' },
  year: { id: 'release-year-before-year', tab: 'criteria' },
  max_percent: { id: 'watch-ratio-low-max-percent', tab: 'criteria' },
  keep_last: { id: 'old-season-keep-last', tab: 'criteria' },
  recently_added_days: { id: 'recently-added-days', tab: 'protect' },
  partially_watched_days: { id: 'partially-watched-days', tab: 'protect' },
};

function clearInlineErrors() {
  document.querySelectorAll('.inline-error').forEach(el => el.remove());
  document.querySelectorAll('.inline-error-highlight').forEach(el => {
    el.classList.remove('inline-error-highlight', 'border-rose-500');
  });
  const topBanner = document.getElementById('cfg-error-banner');
  if (topBanner) topBanner.remove();
}

function showInlineError(fieldKey, message) {
  const info = FIELD_MAP[fieldKey];
  const status = document.getElementById('cfg-status');
  if (!info) {
    // Unknown field -> top banner
    let banner = document.getElementById('cfg-error-banner');
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'cfg-error-banner';
      banner.className = 'mb-4 px-4 py-3 rounded-md bg-rose-500/10 border border-rose-500/30 text-rose-300 text-sm inline-error';
      const body = document.getElementById('settings-body');
      if (body) body.insertBefore(banner, body.firstChild);
    }
    banner.textContent = message;
    banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  // Switch to the correct tab first
  if (info.tab) switchTab(info.tab);
  const target = document.getElementById(info.id);
  if (!target) {
    if (status) {
      status.textContent = message;
      status.className = 'text-sm text-rose-500';
    }
    return;
  }
  target.classList.add('inline-error-highlight', 'border-rose-500');
  const err = document.createElement('div');
  err.className = 'inline-error text-xs text-rose-400 mt-1';
  err.textContent = message;
  if (target.parentNode) target.parentNode.insertBefore(err, target.nextSibling);
  target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  if (typeof target.focus === 'function') target.focus();
}

function buildSaveBody() {
  const criteria = gatherCriteria();

  const libSel = document.getElementById('cfg-library');
  const libOpt = libSel ? libSel.options[libSel.selectedIndex] : null;
  const derivedMediaType = libOpt ? (libOpt.getAttribute('data-type') || 'movie') : 'movie';

  const newName = document.getElementById('cfg-name')?.value?.trim() || '';
  const hasDelete = pipelineSteps.some(s => s.type === 'delete' || s.type === 'delete_files');
  const hasUnmonitor = pipelineSteps.some(s => s.type === 'unmonitor');
  const legacyAction = hasDelete ? 'delete' : hasUnmonitor ? 'unmonitor' : 'none';

  // Per-rule schedule + priority (Advanced section). Empty cron is
  // sent as null so the backend resets to the global nightly schedule.
  const cronRaw = (document.getElementById('cfg-schedule-cron')?.value || '').trim();
  const priorityRaw = document.getElementById('cfg-priority')?.value;
  const priorityParsed = parseInt(priorityRaw, 10);

  const body = {
    media_type: derivedMediaType,
    action: legacyAction,
    grace_days: parseInt(document.getElementById('cfg-grace-days')?.value || '30', 10),
    enabled: document.getElementById('cfg-enabled')?.checked ?? true,
    criteria: criteria,
    schedule_cron: cronRaw || null,
    priority: isNaN(priorityParsed) ? 100 : priorityParsed,
  };
  if (newName && newName !== collectionConfig?.name) {
    body.name = newName;
  }
  return body;
}

function saveConfig() {
  // If the pipeline contains destructive steps, confirm first.
  if (pipelineHasDestructive(pipelineSteps)) {
    const dlg = document.getElementById('pipeline-confirm-dialog');
    const summary = document.getElementById('pipeline-confirm-summary');
    const impact = document.getElementById('pipeline-confirm-impact');
    const saveBtn = document.getElementById('pipeline-confirm-save-btn');
    if (dlg && summary && impact && saveBtn) {
      summary.textContent = buildPipelineSummary(pipelineSteps);
      // Best-effort staged-item count from collectionConfig (if backend provides it);
      // otherwise fall back to a generic note.
      let stagedCount = null;
      try {
        if (collectionConfig && typeof collectionConfig.staged === 'number') {
          stagedCount = collectionConfig.staged;
        }
      } catch (_) {}
      impact.textContent = stagedCount != null
        ? 'This affects ' + stagedCount + ' staged item' + (stagedCount === 1 ? '' : 's') + ' when actions run.'
        : 'This affects any currently-staged items when actions run.';
      // Single-use handler
      const handler = () => {
        saveBtn.removeEventListener('click', handler);
        dlg.close();
        performSave();
      };
      saveBtn.addEventListener('click', handler);
      dlg.showModal();
      return;
    }
  }
  performSave();
}

function performSave() {
  const status = document.getElementById('cfg-status');
  status.textContent = 'Saving...';
  status.className = 'text-sm text-zinc-400';
  clearInlineErrors();

  // Client-side cron validation gate. An invalid cron would be rejected
  // by the backend too, but blocking here keeps the error visible next
  // to the Advanced section and avoids a network round-trip.
  const cronEl = document.getElementById('cfg-schedule-cron');
  if (cronEl) {
    const v = validateCron(cronEl.value || '');
    if (!v.ok) {
      status.textContent = 'Invalid cron: ' + v.error;
      status.className = 'text-sm text-rose-500';
      showInlineError('schedule_cron', 'Invalid cron: ' + v.error);
      return;
    }
  }

  // Pipeline step compatibility gate (e.g. downgrade_quality on season
  // rules). updateSaveGate() already disables the button, but guard
  // against a programmatic call to performSave() too.
  if (typeof pipelineHasBlockingIssue === 'function' && pipelineHasBlockingIssue()) {
    status.textContent = 'Fix incompatible action types before saving.';
    status.className = 'text-sm text-rose-500';
    showToast('Fix incompatible action types before saving.', 'error');
    switchTab('action');
    return;
  }

  let body;
  try {
    body = buildSaveBody();
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
    status.className = 'text-sm text-rose-500';
    console.error('saveConfig build error:', e);
    showToast('Save failed: ' + e.message, 'error');
    return;
  }

  fetch(`/api/collections/${colName}/config`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  })
  .then(async r => {
    if (!r.ok) {
      const raw = await r.text();
      let payload = null;
      try { payload = JSON.parse(raw); } catch (_) {}
      const err = new Error(
        (payload && typeof payload.detail === 'string' && payload.detail) ||
        (payload && payload.message) ||
        ('HTTP ' + r.status)
      );
      err.status = r.status;
      err.payload = payload;
      throw err;
    }
    return r.json();
  })
  .then(data => {
    status.textContent = 'Saved successfully.';
    status.className = 'text-sm text-emerald-500';
    // Detect a rename (data.name differs from current slug's implied name)
    const currentName = collectionConfig && collectionConfig.name;
    if (body.name && data.name && data.name !== currentName) {
      showToast('Rule renamed. Old URL will no longer work.', 'info');
      const newSlug = data.name.toLowerCase().replace(/\s+/g, '-').replace(/--+/g, '-');
      // Delay so the user can see the toast
      setTimeout(() => {
        window.location.href = '/rules/' + newSlug + '/settings';
      }, 2000);
    } else {
      // Refresh cached config so future saves reflect the current state
      collectionConfig = { ...(collectionConfig || {}), ...(data || {}) };
      showToast('Saved', 'success');
    }
  })
  .catch(err => {
    // Try to extract structured validation errors.
    const p = err.payload;
    let handled = false;
    if (p && Array.isArray(p.detail)) {
      // FastAPI style: [{loc: [...], msg, type}]
      for (const v of p.detail) {
        const key = Array.isArray(v.loc) ? v.loc[v.loc.length - 1] : null;
        if (key) {
          showInlineError(key, v.msg || 'Invalid value');
          handled = true;
        }
      }
    } else if (p && typeof p.detail === 'object' && p.detail && p.detail.field) {
      showInlineError(p.detail.field, p.detail.msg || p.detail.detail || 'Invalid value');
      handled = true;
    } else if (p && typeof p.field === 'string') {
      showInlineError(p.field, p.message || p.detail || 'Invalid value');
      handled = true;
    }
    if (!handled) {
      // Generic top-banner fallback; form state preserved
      showInlineError('__unknown__', err.message);
    }
    status.textContent = 'Error: ' + err.message;
    status.className = 'text-sm text-rose-500';
    showToast('Save failed: ' + err.message, 'error');
    console.error('saveConfig error:', err);
  });
}

/* --- Delete flow with name confirmation + item-count preview --- */

function openDeleteDialog() {
  const dlg = document.getElementById('delete-dialog');
  if (!dlg) return;
  const displayName = (collectionConfig && collectionConfig.name) || colName;
  const nameSpan = document.getElementById('delete-rule-name');
  const nameInline = document.getElementById('delete-rule-name-inline');
  if (nameSpan) nameSpan.textContent = displayName;
  if (nameInline) nameInline.textContent = displayName;

  const countEl = document.getElementById('delete-item-count');
  if (countEl) countEl.textContent = '...';

  // Reset input + confirm button
  const input = document.getElementById('delete-name-confirm');
  const btn = document.getElementById('delete-confirm-btn');
  if (input) {
    input.value = '';
    input.oninput = () => {
      if (!btn) return;
      const match = input.value === displayName;
      btn.disabled = !match;
      btn.classList.toggle('opacity-50', !match);
      btn.classList.toggle('cursor-not-allowed', !match);
    };
  }
  if (btn) {
    btn.disabled = true;
    btn.classList.add('opacity-50', 'cursor-not-allowed');
    btn.textContent = 'Delete Rule';
  }

  // Fetch item count via the browse endpoint (per_page=1 just to read total cheaply).
  // Count covers all tracked items for this rule regardless of status.
  fetch(`/api/collections/${encodeURIComponent(colName)}?per_page=1&page=1`)
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      const total = (d && typeof d.total === 'number') ? d.total : null;
      if (countEl) {
        countEl.textContent = total != null ? String(total) : 'any';
      }
    })
    .catch(() => {
      if (countEl) countEl.textContent = 'any';
    });

  dlg.showModal();
  setTimeout(() => { if (input) input.focus(); }, 50);
}

function confirmDelete() {
  const btn = document.getElementById('delete-confirm-btn');
  if (btn) {
    btn.disabled = true;
    btn.classList.add('opacity-50', 'cursor-not-allowed');
    btn.textContent = 'Deleting...';
  }

  fetch(`/api/collections/${colName}`, { method: 'DELETE' })
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(() => {
      showToast('Rule deleted', 'success');
      setTimeout(() => { window.location.href = '/rules'; }, 600);
    })
    .catch(err => {
      document.getElementById('delete-dialog').close();
      showToast('Delete failed: ' + err.message, 'error');
      const status = document.getElementById('cfg-status');
      if (status) {
        status.textContent = `Delete failed: ${err.message}`;
        status.className = 'text-sm text-rose-500';
      }
      if (btn) {
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
        btn.textContent = 'Delete Rule';
      }
    });
}

// Initial load
loadConfig();
</script>
{{end}}
